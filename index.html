function renderRequirement(){
  const opps=summaryData.opportunities||[];
  const filterVal=window._reqFilter||'';
  const today=new Date().toISOString().split('T')[0];
  const statusColors={Open:'var(--text-secondary)',Confirmed:'var(--success)',Gap:'var(--danger)'};
  const statusOrder=['Open','Confirmed','Gap'];

  // Filter chips
  const clientList=[...new Set(opps.map(o=>o.client))].sort();
  let html=`<div style="display:flex;gap:7px;align-items:center;margin-bottom:16px;flex-wrap:wrap">
    <span style="${chipCls(!filterVal)}" onclick="window._reqFilter='';renderView()">All</span>
    ${clientList.map(c=>`<span style="${chipCls(filterVal===c)}" onclick="window._reqFilter='${escAttr(c)}';renderView()">${escHtml(c)}</span>`).join('')}
  </div>`;

  const filteredOpps=filterVal?opps.filter(o=>o.client===filterVal):opps;

  const grouped=[];
  const seen={};
  filteredOpps.forEach(o=>{
    const meetings=(o.meetings||[]).map(m=>{
      const reqs=(m.requirements||[]).map((r,i)=>{
        const rt=typeof r==='string'?r:r.text;
        const rs=typeof r==='string'?'Open':(r.status||'Open');
        const rd=typeof r==='string'?'':(r.due||'');
        const isOverdue=rd&&rd<today&&rs!=='Confirmed';
        const isDueSoon=rd&&rs!=='Confirmed'&&!isOverdue&&((new Date(rd)-new Date(today))/(86400000))<=7&&((new Date(rd)-new Date(today))/(86400000))>=0;
        return{text:rt,status:rs,due:rd,reqIdx:i,isOverdue,isDueSoon};
      });
      return{date:m.fields?.Date||'',title:m.fields?.Title||m.fields?.Opportunity||'',filename:m.filename,reqs};
    }).filter(m=>m.reqs.length);
    if(!meetings.length)return;
    const key=o.client+'|'+o.name;
    if(!(key in seen)){seen[key]=grouped.length;grouped.push({client:o.client,oppName:o.name,oppId:o.id,product:o.product||'',meetings:[]});}
    grouped[seen[key]].meetings.push(...meetings);
  });

  if(!grouped.length)return html+'<div class="empty-state"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg><p>No requirements tracked yet — add requirements in meeting notes</p></div>';

  grouped.forEach(g=>{
    let totalGap=0,totalConfirmed=0,totalOverdue=0,totalDueSoon=0;
    g.meetings.forEach(m=>{m.reqs.forEach(r=>{if(r.status==='Gap')totalGap++;if(r.status==='Confirmed')totalConfirmed++;if(r.isOverdue)totalOverdue++;if(r.isDueSoon)totalDueSoon++;});});
    html+=`<div class="glass panel" style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div>
          <div style="font-size:14px;font-weight:700;color:var(--text-primary)">${escHtml(g.client)} <span style="color:var(--text-secondary);font-weight:400">·</span> ${escHtml(g.oppName)}</div>
          <div style="font-size:10px;color:var(--accent);margin-top:1px">${escHtml(g.product)}</div>
        </div>
        <div style="display:flex;gap:6px">
          ${totalConfirmed?`<span style="font-size:9px;padding:2px 6px;border-radius:10px;background:var(--success)1a;color:var(--success);border:1px solid var(--success)44">${totalConfirmed} confirmed</span>`:''}
          ${totalGap?`<span style="font-size:9px;padding:2px 6px;border-radius:10px;background:var(--danger)1a;color:var(--danger);border:1px solid var(--danger)44">${totalGap} gap${totalGap>1?'s':''}</span>`:''}
          ${totalOverdue?`<span style="font-size:9px;padding:2px 6px;border-radius:10px;background:var(--danger)1a;color:var(--danger);border:1px solid var(--danger)44">${totalOverdue} overdue</span>`:''}
          ${totalDueSoon?`<span style="font-size:9px;padding:2px 6px;border-radius:10px;background:var(--warning)1a;color:var(--warning);border:1px solid var(--warning)44">${totalDueSoon} due soon</span>`:''}
        </div>
      </div>`;

    g.meetings.slice().sort((a,b)=>(b.date||'').localeCompare(a.date||'')).forEach(m=>{
      html+=`<div style="background:var(--surface-2);border-radius:var(--radius);padding:10px 12px;margin-bottom:10px">
        <div style="display:flex;gap:8px;align-items:baseline;margin-bottom:8px">
          <span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);flex-shrink:0">${fmtDate(m.date)}</span>
          <span style="font-size:12px;font-weight:600;color:var(--text-primary)">${escHtml(m.title)}</span>
        </div>`;

      if(m.reqs.length){
        html+=`<div style="margin-bottom:6px"><div style="font-size:9px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">Requirements</div>`;
        m.reqs.forEach(r=>{
          const clr=statusColors[r.status]||'var(--text-secondary)';
          const nextIdx=(statusOrder.indexOf(r.status)+1)%statusOrder.length;
          const next=statusOrder[nextIdx];
          const dueClr=r.isOverdue?'var(--danger)':r.isDueSoon?'var(--warning)':'var(--text-muted)';
          html+=`<div style="display:flex;gap:8px;align-items:center;padding:4px 0;border-bottom:1px solid var(--border)">
            <span data-opp="${escAttr(g.oppId)}" data-file="${escAttr(m.filename)}" data-idx="${r.reqIdx}" data-st="${r.status}" class="req-status-badge" style="font-size:9px;padding:2px 6px;border-radius:10px;background:${clr}1a;color:${clr};border:1px solid ${clr}44;cursor:pointer;user-select:none;white-space:nowrap;flex-shrink:0;min-width:56px;text-align:center" title="Click: ${next}">${r.status}</span>
            <span style="flex:1;font-size:11px;color:var(--text-primary)">${escHtml(r.text)}</span>
            ${r.due?`<span style="font-family:var(--font-mono);font-size:10px;color:${dueClr};flex-shrink:0;${r.isOverdue?'font-weight:700':''}">${fmtDate(r.due)}</span>`:''}
          </div>`;
        });
        html+=`</div>`;
      }

      html+=`</div>`;
    });

    html+=`</div>`;
  });
  return html;
}

function renderResources(){
  const res=summaryData.resources||[];
  const filterVal=window._resFilter||'';
  let html='';

  if(!res.length)return'<div class="empty-state"><svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg><p>No resources yet</p></div>';

  // Filter chips
  const clientList=[...new Set(res.map(r=>r.client||'Other'))].sort();
  html+=`<div style="display:flex;gap:7px;align-items:center;margin-bottom:18px;flex-wrap:wrap">
    <span style="${chipCls(!filterVal)}" onclick="window._resFilter='';renderView()">All</span>
    ${clientList.map(c=>`<span style="${chipCls(filterVal===c)}" onclick="window._resFilter='${escAttr(c)}';renderView()">${escHtml(c)}</span>`).join('')}
  </div>`;

  const filtered=filterVal?res.filter(r=>(r.client||'Other')===filterVal):res;

  // Group by client
  const byClient={};
  filtered.forEach(r=>{
    const c=r.client||'Other';
    if(!byClient[c])byClient[c]=[];
    byClient[c].push(r);
  });

  const sortedClients=Object.keys(byClient).sort((a,b)=>a==='Other'?1:b==='Other'?-1:a.localeCompare(b));

  sortedClients.forEach(clientName=>{
    const items=byClient[clientName];
    // Sub-group by type
    const byType={};
    const typeOrder=['Clients','Opportunities','Meeting Notes'];
    items.forEach(r=>{
      const t=r.category||'Other';
      if(!byType[t])byType[t]=[];
      byType[t].push(r);
    });

    const typeColors={'Clients':'var(--accent)','Opportunities':'var(--info)','Meeting Notes':'var(--success)'};

    html+=`<div class="glass panel" style="margin-bottom:14px">
      <h3 style="font-size:15px">${escHtml(clientName)} <span style="font-size:11px;color:var(--text-muted);font-weight:400">(${items.length})</span></h3>`;

    typeOrder.forEach(type=>{
      if(!byType[type])return;
      const typeItems=byType[type];
      const color=typeColors[type]||'var(--text-secondary)';
      html+=`<div style="margin-top:10px;margin-bottom:4px;font-size:11px;color:${color};font-weight:600;text-transform:uppercase;letter-spacing:.3px">${escHtml(type)} (${typeItems.length})</div>
        <div class="card-grid" style="margin-top:4px">`;
      typeItems.forEach(r=>{
        const title=r.filename.replace('.md','');
        const preview=escHtml(r.content.substring(0,150))+(r.content.length>150?'...':'');
        const clickAction=type==='Meeting Notes'&&r.oppFolder
          ?`onclick="openMeetingResource('${escAttr(r.oppFolder)}','${escAttr(r.filename)}')"`
          :`onclick="openResourceDetail('${escAttr(r.category)}','${escAttr(r.filename)}')"`;
        html+=`<div class="glass-sm opp-card" ${clickAction}>
          <div style="padding:10px 12px">
            <div style="font-size:11px;font-weight:600;color:var(--text-primary)">${escHtml(title)}</div>
            <div style="font-size:9px;color:var(--text-muted);margin-top:3px;line-height:1.4">${preview}</div>
          </div>
        </div>`;
      });
      html+=`</div>`;
    });

    // Other resource types under this client
    Object.keys(byType).forEach(type=>{
      if(typeOrder.includes(type))return;
      const typeItems=byType[type];
      html+=`<div style="margin-top:10px;margin-bottom:4px;font-size:11px;color:var(--text-secondary);font-weight:600;text-transform:uppercase;letter-spacing:.3px">${escHtml(type)} (${typeItems.length})</div>
        <div class="card-grid" style="margin-top:4px">`;
      typeItems.forEach(r=>{
        html+=`<div class="glass-sm opp-card" onclick="openResourceDetail('${escAttr(r.category)}','${escAttr(r.filename)}')">
          <div style="padding:10px 12px">
            <div style="font-size:11px;font-weight:600;color:var(--text-primary)">${escHtml(r.filename.replace('.md',''))}</div>
            <div style="font-size:9px;color:var(--text-muted);margin-top:3px">${escHtml(r.content.substring(0,120))}${r.content.length>120?'...':''}</div>
          </div>
        </div>`;
      });
      html+=`</div>`;
    });

    html+=`</div>`;
  });

  return html;
}


function renderArchive(){
  const arc=summaryData.archive||{won:[],lost:[]};
  const wonTotal=arc.won?arc.won.length:0;
  const lostTotal=arc.lost?arc.lost.length:0;
  const total=wonTotal+lostTotal;
  const winRate=total>0?Math.round(wonTotal/total*100):0;
  if(!total)return'<div class="empty-state"><svg viewBox="0 0 24 24"><path d="M20.54 5.23l-1.39-1.68C18.88 3.21 18.47 3 18 3H6c-.47 0-.88.21-1.16.55L3.46 5.23C3.17 5.57 3 6 3 6.5V19c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6.5c0-.5-.17-.93-.46-1.27z"/></svg><p>No archived deals yet</p></div>';

  // Collect all years across won+lost
  const yearSet=new Set();
  arc.won.forEach(a=>yearSet.add(a.year));
  arc.lost.forEach(a=>yearSet.add(a.year));
  const years=[...yearSet].sort((a,b)=>b.localeCompare(a));

  // Top stats
  let html=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:18px">
    <div class="glass kpi-card"><div class="label">Won Deals</div><div class="value" style="color:var(--success)">${wonTotal}</div></div>
    <div class="glass kpi-card"><div class="label">Lost Deals</div><div class="value" style="color:var(--danger)">${lostTotal}</div></div>
    <div class="glass kpi-card"><div class="label">Win Rate</div><div class="value" style="color:${winRate>=50?'var(--success)':'var(--warning)'}">${winRate}%</div></div>
  </div>`;

  // By year sections
  years.forEach(year=>{
    const wonItems=(arc.won||[]).filter(a=>a.year===year);
    const lostItems=(arc.lost||[]).filter(a=>a.year===year);
    const yearTotal=wonItems.length+lostItems.length;
    html+=`<div class="glass panel" style="margin-bottom:14px">
      <h3 style="display:flex;align-items:center;gap:10px">${year} <span style="font-size:11px;color:var(--text-muted);font-weight:400">(${yearTotal} deals)</span>
        <span style="font-size:10px;color:var(--success);font-weight:600">${wonItems.length} won</span>
        <span style="font-size:10px;color:var(--danger);font-weight:600">${lostItems.length} lost</span>
      </h3>`;

    if(wonItems.length){
      html+=`<div style="margin-top:10px;padding-left:8px;border-left:3px solid var(--success)">
        <div style="font-size:12px;font-weight:700;color:var(--success);margin-bottom:6px">Won (${wonItems.length})</div>`;
      const byClient={};
      wonItems.forEach(a=>{if(!byClient[a.client])byClient[a.client]=[];byClient[a.client].push(a)});
      Object.entries(byClient).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([client,items])=>{
        html+=`<div style="font-size:11px;font-weight:600;color:var(--text-primary);margin-top:4px">${escHtml(client)}</div>`;
        items.forEach(a=>{
          const oppName=a.folder.replace(/^OPP-\d+-/,'').replace(/-/g,' ').replace(new RegExp('^'+a.client.replace(/\s/g,'')+'\\s*','i'),'').trim();
          html+=`<div class="glass-sm" style="cursor:pointer;padding:6px 12px;margin:4px 0 4px 8px;border-radius:var(--radius-sm)" onclick="openArchiveOpp('${escAttr(a.folder)}','Won','${escAttr(year)}','${escAttr(a.client)}')">
            <span style="font-size:12px;color:var(--text-primary)">${escHtml(oppName||a.folder)}</span>
          </div>`;
        });
      });
      html+=`</div>`;
    }

    if(lostItems.length){
      html+=`<div style="margin-top:10px;padding-left:8px;border-left:3px solid var(--danger)">
        <div style="font-size:12px;font-weight:700;color:var(--danger);margin-bottom:6px">Lost (${lostItems.length})</div>`;
      const byClient={};
      lostItems.forEach(a=>{if(!byClient[a.client])byClient[a.client]=[];byClient[a.client].push(a)});
      Object.entries(byClient).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([client,items])=>{
        html+=`<div style="font-size:11px;font-weight:600;color:var(--text-primary);margin-top:4px">${escHtml(client)}</div>`;
        items.forEach(a=>{
          const oppName=a.folder.replace(/^OPP-\d+-/,'').replace(/-/g,' ').replace(new RegExp('^'+a.client.replace(/\s/g,'')+'\\s*','i'),'').trim();
          html+=`<div class="glass-sm" style="cursor:pointer;padding:6px 12px;margin:4px 0 4px 8px;border-radius:var(--radius-sm)" onclick="openArchiveOpp('${escAttr(a.folder)}','Lost','${escAttr(year)}','${escAttr(a.client)}')">
            <span style="font-size:12px;color:var(--text-primary)">${escHtml(oppName||a.folder)}</span>
          </div>`;
        });
      });
      html+=`</div>`;
    }

    html+=`</div>`;
  });

  return html;
}

let _activeMeeting=null;
function findMeeting(oppId,filename){
  const o=summaryData.opportunities?.find(x=>x.id===oppId);
  return o?.meetings?.find(x=>x.filename===filename)||null;
}
async function saveMeetingField(oppId,filename,field,value){
  const m=findMeeting(oppId,filename);
  if(!m)return;
  const curr=field==='attendees'?m.fields?.Attendees:field==='venue'?m.fields?.Venue:field==='date'?m.fields?.Date:field==='title'?m.fields?.Title:m[field];
  const currStr=typeof curr==='object'?JSON.stringify(curr):String(curr||'');
  const valStr=typeof value==='object'?JSON.stringify(value):String(value||'');
  if(currStr===valStr)return;
  const res=await apiPut(`/api/opportunities/${encodeURIComponent(oppId)}/meetings/${encodeURIComponent(filename)}`,{[field]:value});
  if(res.error)return showToast(res.error,'error');
  await loadAll();
  if(_activeMeeting){
    _activeMeeting=findMeeting(oppId,filename);
    openMeetingDetail(oppId,null,filename);
  } else {
    renderView();
  }
  showToast('Updated');
}

function openMeetingDetail(oppId,date,filename){
  const o=summaryData.opportunities.find(x=>x.id===oppId);
  if(!o)return;
  const m=o.meetings?.find(x=>(x.fields?.Date||'')===date || x.filename===filename);
  if(!m)return;
  _activeMeeting=m;
  const venue=m.fields?.Venue||m.fields?.Location||'';
  let html='';
  html+=`<div style="font-size:11px;color:var(--text-muted);margin-bottom:8px">${escHtml(o.id)}</div>`;
  html+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
    <div><span style="font-size:10px;color:var(--text-muted)">Title</span><div contenteditable="true" style="font-size:14px;font-weight:700" onblur="saveMeetingField('${escAttr(oppId)}','${escAttr(m.filename)}','title',this.textContent.trim())">${escHtml(m.fields?.Title||m.fields?.Opportunity||'')}</div></div>
    <div><span style="font-size:10px;color:var(--text-muted)">Date</span><input type="text" value="${escAttr(m.fields?.Date||'')}" placeholder="yyyy-mm-dd" pattern="\d{4}-\d{2}-\d{2}" style="font-family:var(--font-mono);font-size:12px;border:1px solid var(--border);border-radius:4px;padding:2px 6px;background:transparent;color:var(--text-primary);width:100%" onchange="saveMeetingField('${escAttr(oppId)}','${escAttr(m.filename)}','date',this.value)"></div>
    <div><span style="font-size:10px;color:var(--text-muted)">Attendees</span><div contenteditable="true" style="font-size:12px" onblur="saveMeetingField('${escAttr(oppId)}','${escAttr(m.filename)}','attendees',this.textContent.trim())">${escHtml(m.fields?.Attendees||'-')}</div></div>
    <div><span style="font-size:10px;color:var(--text-muted)">Venue</span><select onchange="saveMeetingField('${escAttr(oppId)}','${escAttr(m.filename)}','venue',this.value)" style="font-size:12px;padding:2px 4px;border:1px solid var(--border);border-radius:var(--radius-xs);background:var(--surface);color:var(--text-primary);cursor:pointer"><option value="Online" ${venue.startsWith('Online')?'selected':''}>Online</option><option value="Physical" ${!venue.startsWith('Online')&&venue!=='TBD'&&venue?'selected':''}>Physical</option></select></div>
  </div>`;

  // Agenda
  html+=`<div class="detail-section"><h4 style="display:flex;justify-content:space-between;align-items:center">Agenda <button class="btn btn-ghost" style="font-size:10px;padding:2px 8px" onclick="addMeetingItem('${escAttr(oppId)}','${escAttr(m.filename)}','agenda')">+ Add</button></h4><div class="detail-content">`;
  (m.agenda||[]).forEach((a,i)=>{html+=`<div style="display:flex;gap:6px;align-items:baseline;padding:2px 0;font-size:12px;color:var(--text-secondary)"><span contenteditable="true" style="flex:1" onblur="updateMeetingListItem('${escAttr(oppId)}','${escAttr(m.filename)}','agenda',${i},this.textContent.trim())">${escHtml(a)}</span><button style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:12px;padding:0 2px" onclick="removeMeetingListItem('${escAttr(oppId)}','${escAttr(m.filename)}','agenda',${i})">&times;</button></div>`;});
  if(!m.agenda||!m.agenda.length)html+=`<div style="font-size:11px;color:var(--text-muted)">No agenda items</div>`;
  html+=`</div></div>`;

  // Requirements
  const reqStatusOrder=['Open','Confirmed','Gap'];
  const reqStatusColors={Open:'var(--text-secondary)',Confirmed:'var(--success)',Gap:'var(--danger)'};
  const today=new Date().toISOString().split('T')[0];
  html+=`<div class="detail-section"><h4 style="display:flex;justify-content:space-between;align-items:center">Requirements <button class="btn btn-ghost" style="font-size:10px;padding:2px 8px" onclick="addMeetingItem('${escAttr(oppId)}','${escAttr(m.filename)}','requirements')">+ Add</button></h4><div class="detail-content">`;
  (m.requirements||[]).forEach((r,i)=>{
    const rt=typeof r==='string'?r:r.text;
    const rs=typeof r==='string'?'Open':(r.status||'Open');
    const rd=typeof r==='string'?'':(r.due||'');
    const clr=reqStatusColors[rs]||'var(--text-secondary)';
    const nextIdx=(reqStatusOrder.indexOf(rs)+1)%reqStatusOrder.length;
    const next=reqStatusOrder[nextIdx];
    const isOverdue=rd&&rd<today&&rs!=='Confirmed';

// Event delegation for status badges (actions + requirements)
document.addEventListener('click',function(e){
  const actionBadge=e.target.closest('.action-status-badge');
  if(actionBadge){
    e.preventDefault();e.stopPropagation();
    const oppId=actionBadge.dataset.opp;
    const filename=actionBadge.dataset.file;
    const idx=parseInt(actionBadge.dataset.idx);
    const current=actionBadge.dataset.st;
    const statusOrder=['Open','In Progress','Completed','Delayed','Cancelled'];
    const nextIdx=(statusOrder.indexOf(current)+1)%statusOrder.length;
    cycleActionStatus(oppId,filename,idx,current,statusOrder[nextIdx]);
    return;
  }
  const reqBadge=e.target.closest('.req-status-badge');
  if(reqBadge){
    e.preventDefault();e.stopPropagation();
    const oppId=reqBadge.dataset.opp;
    const filename=reqBadge.dataset.file;
    const idx=parseInt(reqBadge.dataset.idx);
    const current=reqBadge.dataset.st;
    const statusOrder=['Open','Confirmed','Gap'];
    const nextIdx=(statusOrder.indexOf(current)+1)%statusOrder.length;
    cycleReqStatus(oppId,filename,idx,current,statusOrder[nextIdx]);
    return;
  }
},{capture:true});

async function saveClientContactEdit(clientId){
  const c=summaryData.clients.find(x=>x.id===clientId);
  if(!c)return;
  const updated=c.contacts.map((ct,i)=>{
    const row={name:'',role:'',email:''};
    ['name','role','email'].forEach(f=>{
      const el=document.querySelector(`.ct-input[data-idx="${i}"][data-field="${f}"]`);
      row[f]=el?el.value.trim():ct[f];
    });
    return row;
  });
  const res=await apiPut(`/api/clients/${encodeURIComponent(clientId)}`,{contacts:updated});
  if(res.error)return showToast(res.error,'error');
  await loadAll();
  openClientDetail(clientId);
  showToast('Contact updated');
}

function renderSalesReport(md){
  if(!md)return '';
  const lines=md.split('\n');
  let html='<div style="font-size:13px;line-height:1.8">';
  let inTable=false,tableRows=[],tableHeaders=[];
  let inQuote=false;
  const hColors={'一':'var(--accent)','二':'var(--info)','三':'var(--warning)','四':'var(--success)'};

  function flushTable(){
    if(!tableRows.length)return;
    const isWide=tableHeaders.length>=5;
    let t='<div style="overflow-x:auto;margin:10px 0"><table style="border-collapse:collapse;width:100%;font-size:12px;min-width:${isWide?700:400}px">';
    t+='<thead><tr>';
    tableHeaders.forEach((h,hi)=>{
      const w=hi===0&&isWide?'200px':'';
      t+=`<th style="padding:8px 12px;border:1px solid var(--border);background:var(--surface);color:var(--text-secondary);font-weight:700;text-align:left;white-space:nowrap;${w?'min-width:'+w:''}">${h}</th>`;
    });
    t+='</tr></thead><tbody>';
    tableRows.forEach((row,ri)=>{
      const bg=ri%2?'var(--surface)':'transparent';
      t+='<tr>';
      row.forEach((cell,ci)=>{
        const isFirst=ci===0;
        t+=`<td style="padding:8px 12px;border:1px solid var(--border);background:${bg};vertical-align:top;${isFirst?'font-weight:600;color:var(--text-primary);white-space:nowrap;min-width:120px':''}">${cell}</td>`;
      });
      t+='</tr>';
    });
    t+='</tbody></table></div>';
    return t;
  }

  function renderInline(text){
    return text
      .replace(/\*\*(.+?)\*\*/g,'<strong style="font-weight:700;color:var(--text-primary)">$1</strong>')
      .replace(/\*(.+?)\*/g,'<em>$1</em>')
      .replace(/`([^`]+)`/g,'<code style="font-family:var(--font-mono);font-size:11px;padding:1px 5px;border-radius:4px;background:var(--surface);border:1px solid var(--border)">$1</code>')
      .replace(/<br\s*\/?>/g,'<br>');
  }

  for(let i=0;i<lines.length;i++){
    const ln=lines[i];
    const t=ln.trim();

    // horizontal rule
    if(t==='---'){
      if(inTable){html+=flushTable();inTable=false;tableRows=[];tableHeaders=[];}
      if(inQuote){html+='</div>';inQuote=false;}
      html+='<hr style="border:none;border-top:1px solid var(--border);margin:16px 0">';
      continue;
    }

    // headings
    const h1=t.match(/^# (.+)$/);
    if(h1){
      if(inTable){html+=flushTable();inTable=false;tableRows=[];tableHeaders=[];}
      if(inQuote){html+='</div>';inQuote=false;}
      html+=`<h1 style="font-size:18px;font-weight:800;margin:0 0 16px;color:var(--text-primary)">${renderInline(h1[1])}</h1>`;
      continue;
    }
    const h2=t.match(/^## (.+)$/);
    if(h2){
      if(inTable){html+=flushTable();inTable=false;tableRows=[];tableHeaders=[];}
      if(inQuote){html+='</div>';inQuote=false;}
      const num=h2[1].match(/^[一二三四五六七八九十]+[、.]/);
      const c=num?hColors[num[0][0]]||'var(--text-primary)':'var(--text-primary)';
      html+=`<h2 style="font-size:16px;font-weight:700;margin:20px 0 10px;padding:8px 14px;border-left:4px solid ${c};color:${c};border-radius:0 var(--radius-sm) var(--radius-sm) 0;background:${c}0d">${renderInline(h2[1])}</h2>`;
      continue;
    }
    const h3=t.match(/^### (.+)$/);
    if(h3){
      if(inTable){html+=flushTable();inTable=false;tableRows=[];tableHeaders=[];}
      if(inQuote){html+='</div>';inQuote=false;}
      html+=`<h3 style="font-size:14px;font-weight:700;margin:14px 0 6px;color:var(--text-secondary)">${renderInline(h3[1])}</h3>`;
      continue;
    }

    // quote block (> lines)
    if(t.startsWith('> ')){
      if(inTable){html+=flushTable();inTable=false;tableRows=[];tableHeaders=[];}
      if(!inQuote){
        html+='<div style="margin:8px 0 12px;padding:10px 16px;background:var(--surface);border-radius:var(--radius-sm);border-left:3px solid var(--border);font-size:12px;color:var(--text-secondary);line-height:1.9">';
        inQuote=true;
      }
      html+=`<div>${renderInline(t.replace(/^> /,''))}</div>`;
      continue;
    }else if(inQuote){
      html+='</div>';
      inQuote=false;
    }

    // table rows
    const tblMatch=t.match(/^\|(.+)\|$/);
    if(tblMatch){
      const cells=tblMatch[1].split('|').map(c=>c.trim());
      if(cells.every(c=>/^[\-:]+$/.test(c))){
        // separator line, skip
        continue;
      }
      if(!inTable){
        inTable=true;
        tableHeaders=cells.map(c=>renderInline(c));
        tableRows=[];
      }else{
        tableRows.push(cells.map(c=>renderInline(c)));
      }
      continue;
    }else if(inTable){
      html+=flushTable();
      inTable=false;tableRows=[];tableHeaders=[];
    }

    // checkbox list
    const chk=t.match(/^- \[([ xX])\] (.+)$/);
    if(chk){
      const checked=chk[1]!==' ';
      html+=`<div style="padding:3px 0 3px 20px;text-indent:-16px;font-size:13px;color:var(--text-primary)">
        <span style="display:inline-block;width:14px;height:14px;border-radius:3px;border:1.5px solid var(--border);margin-right:6px;vertical-align:middle;${checked?'background:var(--accent);border-color:var(--accent)':''}">
          ${checked?'<svg viewBox="0 0 12 12" style="width:10px;height:10px;margin:1px;fill:white"><path d="M10 3L5 8 2 5"/></svg>':''}
        </span>${renderInline(chk[2])}</div>`;
      continue;
    }

    // bullet list
    if(t.startsWith('- ')){
      html+=`<div style="padding:3px 0 3px 20px;text-indent:-12px;font-size:13px;color:var(--text-primary)">• ${renderInline(t.replace(/^- /,''))}</div>`;
      continue;
    }

    // empty line
    if(t===''){
      html+='<div style="margin:4px 0"></div>';
      continue;
    }

    // plain paragraph
    html+=`<p style="margin:6px 0;font-size:13px;line-height:1.8;color:var(--text-primary)">${renderInline(t)}</p>`;
  }

  if(inTable)html+=flushTable();
  if(inQuote)html+='</div>';
  html+='</div>';
  return html;
}

function parseWeeklyReportContent(content){
  const result=[];
  let currentCat=null;
  let currentProduct=null;
  let currentOpp=null;
  let currentSection=''; // 'progress','risks','requirements','nextweek'
  let currentMeeting=null;
  const lines=content.split('\n');

  for(const line of lines){
    const t=line.trim();
    if(t.startsWith('## ')){
      currentCat={name:t.replace(/^## /,''),summary:'',products:[]};
      result.push(currentCat);
      currentProduct=null;currentOpp=null;currentSection='';currentMeeting=null;
      continue;
    }
    if(t.startsWith('### Product: ')){
      currentProduct={name:t.replace(/^### Product: /,''),opportunities:[]};
      if(currentCat)currentCat.products.push(currentProduct);
      currentOpp=null;currentSection='';currentMeeting=null;
      continue;
    }
    if(t.startsWith('#### ')){
      const parts=t.replace(/^#### /,'').split(' — ');
      currentOpp={client:parts[0]||'',opportunity:parts[1]||'',budget:'-',stage:'',meetings:[],risks:[],requirements:[]};
      // If no product yet, create a default one
      if(currentCat){
        if(currentCat.products.length===0){
          currentProduct={name:currentCat.name,opportunities:[]};
          currentCat.products.push(currentProduct);
        }
        currentCat.products[currentCat.products.length-1].opportunities.push(currentOpp);
      }
      currentSection='';currentMeeting=null;
      continue;
    }
    if(t.startsWith('**Summary:**')&&currentCat){
      currentCat.summary=t.replace(/^\*\*Summary:\*\*\s*/,'');
      continue;
    }
    if(t.startsWith('- **Budget:**')&&currentOpp){
      currentOpp.budget=t.replace(/^- \*\*Budget:\*\*\s*/,'');
      continue;
    }
    if(t.startsWith('- **Stage:**')&&currentOpp){
      currentOpp.stage=t.replace(/^- \*\*Stage:\*\*\s*/,'');
      continue;
    }
    if(t.startsWith('- **Product:**')&&currentOpp){
      currentOpp.stage=t.replace(/^- \*\*Product:\*\*\s*/,'');
      continue;
    }
    if(t.startsWith('**This Week Progress:**')&&currentOpp){
      currentSection='progress';currentMeeting=null;
      continue;
    }
    if(t.startsWith('**Risks:**')&&currentOpp){
      currentSection='risks';continue;
    }
    if(t.startsWith('**Requirements:**')&&currentOpp){
      currentSection='requirements';continue;
    }
    if(t.startsWith('**Next Week Plan:**')&&currentOpp){
      currentSection='nextweek';continue;
    }
    if(t==='---'){currentSection='';currentMeeting=null;continue;}

    // Parse progress meetings
    if(currentSection==='progress'&&currentOpp){
      const meetMatch=t.match(/^(\d{4}-\d{2}-\d{2})\s+—\s+(.+)$/);
      if(meetMatch){
        currentMeeting={date:meetMatch[1],title:meetMatch[2],agenda:[]};
        currentOpp.meetings.push(currentMeeting);
      } else if(t.startsWith('- ')&&currentMeeting){
        currentMeeting.agenda.push(t.replace(/^- /,''));
      }
    }

    // Parse risks
    if(currentSection==='risks'&&currentOpp&&t.startsWith('- ')){
      const rm=t.replace(/^- /,'');
      const rmMatch=rm.match(/^(\d{4}-\d{2}-\d{2})\s+(.+?):\s+(.+?)(\s*\(Mitigation:\s*|\s*$)/);
      if(rmMatch){
        let mit='';
        const mitM=rm.match(/\(Mitigation:\s*(.+?)\)/);
        if(mitM)mit=mitM[1];
        currentOpp.risks.push({date:rmMatch[1],meeting:rmMatch[2],text:rmMatch[3].trim(),mit});
      } else {
        // Simpler format without date prefix
        const simpleMatch=rm.match(/^(.+?)(\s*\(Mitigation:\s*|\s*$)/);
        if(simpleMatch){
          let mit='';
          const mitM=rm.match(/\(Mitigation:\s*(.+?)\)/);
          if(mitM)mit=mitM[1];
          currentOpp.risks.push({date:'',meeting:'',text:simpleMatch[1].trim(),mit});
        }
      }
    }

    // Parse requirements
    if(currentSection==='requirements'&&currentOpp&&t.startsWith('- ')){
      const rq=t.replace(/^- /,'');
      const rqMatch=rq.match(/^(\d{4}-\d{2}-\d{2})\s+(.+?):\s+(.+?)(\s*\[|$)/);
      if(rqMatch){
        let status='Open';
        const stM=rq.match(/\[(Confirmed|Open|Gap)\]/);
        if(stM)status=stM[1];
        currentOpp.requirements.push({date:rqMatch[1],meeting:rqMatch[2],text:rqMatch[3].trim(),status});
      } else {
        const simpleMatch=rq.match(/^(.+?)(\s*\[|$)/);
        if(simpleMatch){
          let status='Open';
          const stM=rq.match(/\[(Confirmed|Open|Gap)\]/);
          if(stM)status=stM[1];
          currentOpp.requirements.push({date:'',meeting:'',text:simpleMatch[1].trim(),status});
        }
      }
    }
  }

  // Ensure every category has at least one product
  for(const cat of result){
    if(cat.products.length===0){
      cat.products.push({name:cat.name,opportunities:[]});
    }
  }

  return result;
}

// --- Stage Cycling ---
async function cycleStage(id,currentStage){
  const activeStages=['Discovery','Proposal','Negotiation','Verbal Commit'];
  const idx=activeStages.indexOf(currentStage);
  if(idx===-1)return;
  const next=activeStages[(idx+1)%activeStages.length];
  const res=await apiPut(`/api/opportunities/${encodeURIComponent(id)}`,{stage:next});
  if(res.error)return showToast(res.error,'error');
  await loadAll();renderView();
  showToast(`Stage updated to ${next}`);
}

async function closeDeal(id, result){
  const label=result==='Won'?'Win':'Lose';
  if(!confirm(`Mark this deal as ${label}? This will archive it.`))return;
  const res=await apiPut(`/api/opportunities/${encodeURIComponent(id)}`,{stage:result});
  if(res.error)return showToast(res.error,'error');
  closeDetail();
  await loadAll();renderView();
  showToast(`Deal closed as ${label}`);
}

async function addStakeholder(id){
  const o=summaryData.opportunities.find(x=>x.id===id);
  if(!o)return;
  const name=prompt('Stakeholder name:');
  if(!name)return;
  const role=prompt('Role:')||'TBD';
  const influence=prompt('Influence (High/Medium/Low):')||'Medium';
  const attitude=prompt('Attitude (Champion/Supporter/Neutral/Skeptic):')||'Neutral';
  const updated=[...(o.stakeholders||[]),{name,role,influence,attitude}];
  await saveOppField(id,'stakeholders',updated);
}

async function syncContacts(id){
  const o=summaryData.opportunities.find(x=>x.id===id);
  if(!o)return;
  const res=await apiPost(`/api/opportunities/${encodeURIComponent(id)}/sync-contacts`);
  if(res.error)return showToast(res.error,'error');
  await loadAll();
  if(_activeOppId===id)openOppDetail(id);
  showToast(`Synced ${res.added||0} contacts (${res.total} total)`);
}

async function cycleInfluence(id,idx,current){
  const cycle=['High','Medium','Low'];
  const next=cycle[(cycle.indexOf(current)+1)%cycle.length];
  const o=summaryData.opportunities.find(x=>x.id===id);
  if(!o)return;
  const updated=(o.stakeholders||[]).map((s,i)=>i===idx?{...s,influence:next}:s);
  await saveOppField(id,'stakeholders',updated);
}

async function cycleAttitude(id,idx,current){
  const cycle=['Champion','Supporter','Neutral','Skeptic'];
  const next=cycle[(cycle.indexOf(current)+1)%cycle.length];
  const o=summaryData.opportunities.find(x=>x.id===id);
  if(!o)return;
  const updated=(o.stakeholders||[]).map((s,i)=>i===idx?{...s,attitude:next}:s);
  await saveOppField(id,'stakeholders',updated);
}

async function removeStakeholder(id,index){
  const o=summaryData.opportunities.find(x=>x.id===id);
  if(!o)return;
  const updated=(o.stakeholders||[]).filter((_,i)=>i!==index);
  await saveOppField(id,'stakeholders',updated);
}

// --- Init ---
async function init(){
  await loadAll();
  renderView();
}
init();
</script>
