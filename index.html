<!DOCTYPE html>
<html lang="en" class="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sales Opportunities Management</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#020617;--bg-elevated:#0E1223;--surface:rgba(255,255,255,0.06);--surface-2:rgba(255,255,255,0.03);
  --border:rgba(255,255,255,0.08);--radius:12px;--radius-sm:8px;--radius-xs:4px;
  --font-body:'Fira Sans',sans-serif;--font-mono:'Fira Code',monospace;
  --sidebar-w:220px;--transition:200ms ease-out;
  --text-primary:rgba(255,255,255,0.95);--text-secondary:rgba(255,255,255,0.65);
  --text-muted:rgba(255,255,255,0.35);
  --accent:#6366F1;--accent-glow:rgba(99,102,241,0.25);
  --success:#22C55E;--warning:#FBBF24;--danger:#EF4444;--info:#3B82F6;
}
.light{
  --bg:#f0f4f8;--bg-elevated:#fff;--surface:rgba(15,23,42,0.04);--surface-2:rgba(15,23,42,0.02);
  --border:rgba(15,23,42,0.1);--text-primary:rgba(15,23,42,0.95);
  --text-secondary:rgba(15,23,42,0.6);--text-muted:rgba(15,23,42,0.35);
  --accent:#4F46E5;--accent-glow:rgba(79,70,229,0.15);
}
html{font-size:14px}
body{font-family:var(--font-body);background:linear-gradient(135deg,#020617 0%,#0a0e27 40%,#1a1040 100%);color:var(--text-primary);display:flex;min-height:100vh}
.light body{background:linear-gradient(135deg,#f0f4f8 0%,#e8ecf2 40%,#e2e8f0 100%)}
.glass{background:rgba(255,255,255,0.08);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.1);border-radius:var(--radius)}
.light .glass{background:rgba(255,255,255,0.75);backdrop-filter:blur(8px);border:1px solid rgba(15,23,42,0.08)}
.glass-sm{background:rgba(255,255,255,0.05);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.07);border-radius:var(--radius-sm)}
.light .glass-sm{background:rgba(255,255,255,0.65);border:1px solid rgba(15,23,42,0.06)}
button{cursor:pointer;font-family:var(--font-body);transition:var(--transition)}
.btn{padding:8px 18px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;border:none}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{filter:brightness(1.15)}
.btn-ghost{background:transparent;color:var(--text-secondary);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface);color:var(--text-primary)}
.btn-danger{background:var(--danger);color:#fff}
#sidebar{width:var(--sidebar-w);min-height:100vh;background:rgba(10,14,30,0.95);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:fixed;left:0;top:0;z-index:10}
.light #sidebar{background:rgba(255,255,255,0.97);border-right:1px solid rgba(15,23,42,0.08)}
.logo{padding:20px 18px;display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#6366F1,#8B5CF6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;font-family:var(--font-mono)}
.logo-text{font-size:13px;font-weight:700;color:var(--text-primary)}
.logo-sub{font-size:9px;color:var(--text-muted);letter-spacing:.5px}
.nav-item{padding:10px 18px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:var(--transition);color:var(--text-muted);font-size:12px;font-weight:500;border-left:2px solid transparent}
.nav-item:hover{background:var(--surface);color:var(--text-secondary)}
.nav-item.active{color:var(--accent);background:var(--accent-glow);border-left-color:var(--accent)}
.nav-item svg{width:18px;height:18px;fill:currentColor;flex-shrink:0}
.user-info{padding:16px 18px;border-top:1px solid var(--border);margin-top:auto}
.user-avatar{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#6366F1,#8B5CF6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px}
.user-name{font-size:12px;font-weight:600;color:var(--text-primary)}
.user-role{font-size:9px;color:var(--text-muted)}
#main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;background:transparent}
#topbar{padding:14px 24px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);flex-shrink:0}
#topbar h1{font-size:17px;font-weight:700;margin:0}
#topbar .sub{font-size:12px;color:var(--text-muted);margin-top:2px}
.topbar-actions{display:flex;gap:10px;align-items:center}
#content{padding:20px 24px;flex:1;overflow-y:auto}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.kpi-card{padding:14px 16px;text-align:center}
.kpi-card .label{font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.kpi-card .value{font-size:24px;font-weight:700;font-family:var(--font-mono);color:var(--text-primary)}
.kpi-card .delta{font-size:12px;margin-top:3px;color:var(--text-secondary)}
.panel{padding:18px 20px}
.panel h3{font-size:15px;font-weight:600;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.panel h3 .link{font-size:12px;color:var(--accent);cursor:pointer}
.dash-grid{display:grid;gap:14px;margin-bottom:14px}
.dash-2-1{grid-template-columns:2fr 1fr}
.dash-1-1{grid-template-columns:1fr 1fr}
.dash-1{grid-template-columns:1fr}
.status-badge{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500;cursor:pointer}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.opp-card{cursor:pointer;transition:var(--transition)}
.opp-card:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.opp-card .card-header{padding:14px 16px 10px;border-bottom:1px solid var(--border)}
.opp-card .card-body{padding:12px 16px}
.opp-card .card-meta{font-size:11px;color:var(--text-muted);margin-bottom:6px}
.opp-card .card-value{font-family:var(--font-mono);font-size:16px;font-weight:700;color:var(--text-primary)}
.opp-card .card-prob{font-size:11px;font-family:var(--font-mono);color:var(--text-secondary)}
.opp-card .card-next{font-size:11px;color:var(--text-muted);margin-top:4px}
.stage-colors{Discovery:'#3B82F6','Proposal':'#FBBF24',Negotiation:'#818CF8','Verbal Commit':'#22C55E',Won:'var(--success)',Lost:'var(--danger)'}
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{text-align:left;padding:8px 10px;color:var(--text-muted);font-weight:500;border-bottom:1px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:.3px}
.data-table td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.04)}
.light .data-table td{border-bottom:1px solid rgba(15,23,42,0.04)}
.data-table tr{cursor:default;transition:var(--transition)}
.data-table tr:hover{background:var(--surface)}
.ct-input,.detail-content input,.detail-content [id^="ct-new-"]{background:transparent;border:1px solid var(--border);border-radius:var(--radius-xs);padding:4px 6px;color:var(--text-primary);font-family:var(--font-body);font-size:11px;outline:none;transition:border-color 150ms}
.ct-input:focus,.detail-content input:focus,.detail-content [id^="ct-new-"]:focus{border-color:var(--accent)}
.data-table thead th[style*="text-align:center"]{text-align:center}
#detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:20;opacity:0;pointer-events:none;transition:opacity 200ms}
#detail-overlay.open{opacity:1;pointer-events:auto}
#detail-panel{position:fixed;right:0;top:0;bottom:0;width:860px;background:var(--bg-elevated);border-left:1px solid var(--border);z-index:21;transform:translateX(100%);transition:transform 250ms ease-out;overflow-y:auto;padding:32px}
#detail-panel.wide{width:96vw;max-width:1400px;left:2vw;border-radius:var(--radius);border:1px solid var(--border)}
#detail-panel.open{transform:translateX(0)}
.light #detail-panel{background:#fff;border-left:1px solid rgba(15,23,42,0.1)}
.close-btn{background:none;border:none;color:var(--text-muted);font-size:22px;cursor:pointer;float:right}
.close-btn:hover{color:var(--text-primary)}
.detail-section{margin-bottom:18px}
.detail-section h4{font-size:12px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.detail-content{font-size:12px;color:var(--text-secondary);line-height:1.6}
.tl-body.open{max-height:none!important;overflow:visible!important}
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:30;display:none;align-items:center;justify-content:center}
#modal-overlay.open{display:flex}
#modal-box{background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:90%;max-width:520px;max-height:80vh;overflow-y:auto}
.light #modal-box{background:#fff;border:1px solid rgba(15,23,42,0.1)}
#modal-box h2{font-size:16px;font-weight:700;margin-bottom:18px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text-primary);font-size:12px;font-family:var(--font-body);outline:none}
.form-group textarea{resize:vertical;min-height:60px}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
#toast{position:fixed;bottom:24px;right:24px;padding:10px 18px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;color:#fff;z-index:50;opacity:0;transform:translateY(10px);transition:all 200ms}
#toast.show{opacity:1;transform:translateY(0)}
#toast.success{background:var(--success)}
#toast.error{background:var(--danger)}
.progress-bar{height:5px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;margin:4px 0}
.light .progress-bar{background:rgba(15,23,42,0.06)}
.progress-fill{height:100%;border-radius:3px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--text-muted)}
.empty-state svg{width:48px;height:48px;fill:currentColor;margin-bottom:12px;opacity:.3}
.empty-state p{font-size:13px}
[contenteditable]{outline:none;border-radius:3px;padding:2px 4px;transition:var(--transition)}
[contenteditable]:focus{box-shadow:0 0 0 1px var(--accent);background:rgba(99,102,241,0.05)}
[contenteditable]:hover{background:rgba(255,255,255,0.04)}
.light [contenteditable]:hover{background:rgba(15,23,42,0.03)}
.action-item{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:11px}
.action-item input[type=checkbox]{accent-color:var(--accent)}
@media(max-width:1024px){
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .dash-2-1,.dash-1-1{grid-template-columns:1fr}
}
@media(max-width:768px){
  #sidebar{width:60px}
  .nav-item span,.user-name,.user-role,.logo-text,.logo-sub{display:none}
  .nav-item{justify-content:center;padding:12px}
  #main{margin-left:60px}
  .kpi-grid{grid-template-columns:1fr}
  #detail-panel{width:100%!important;left:0!important;border-radius:0!important;border:none!important}
  #detail-panel.wide{width:100%!important;max-width:100%!important;left:0!important}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
@keyframes barGrow{from{transform:scaleX(0)}to{transform:scaleX(1)}}
.opp-health-row:hover{opacity:.85;transform:translateX(2px)}
.opp-health-row{transition:var(--transition)}
@media(max-width:1024px){
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .dash-2col{grid-template-columns:1fr!important}
  div[style*="grid-template-columns:1fr 1fr 1fr"]{grid-template-columns:1fr 1fr!important}
}
.dash-alert-strip{display:flex;gap:8px;padding:12px 16px;margin-bottom:18px;border-radius:var(--radius);background:var(--surface);border:1px solid var(--border);overflow-x:auto;flex-wrap:wrap;align-items:center}
.dash-alert-item{font-size:12px;font-weight:700;padding:6px 14px;border-radius:16px;white-space:nowrap;display:flex;align-items:center;gap:5px;letter-spacing:.2px}
.dash-alert-strip.has-critical{border-color:rgba(239,68,68,0.25);animation:pulse-border 2s ease-in-out infinite}
@keyframes pulse-border{0%,100%{border-color:rgba(239,68,68,0.15)}50%{border-color:rgba(239,68,68,0.45)}}
.dash-action-card{padding:10px 14px;border-radius:var(--radius-sm);margin-bottom:8px;cursor:pointer;transition:var(--transition)}
.dash-action-card:hover{filter:brightness(1.08);transform:translateX(3px)}
.dash-action-card.overdue{background:rgba(239,68,68,0.07);border-left:3px solid var(--danger)}
.dash-action-card.due-soon{background:rgba(251,191,36,0.06);border-left:3px solid var(--warning)}
.dash-action-card.upcoming{background:var(--surface);border-left:3px solid var(--info)}
.dash-issues-panel .issue-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:var(--transition)}
.dash-issues-panel .issue-row:hover{background:var(--surface);padding-left:4px}
.dash-issues-panel .issue-type{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;flex-shrink:0}
.traffic-light{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;font-size:11px;font-weight:800;flex-shrink:0}
.traffic-light.green{background:rgba(34,197,94,0.15);color:var(--success);border:2px solid var(--success)}
.traffic-light.yellow{background:rgba(251,191,36,0.15);color:var(--warning);border:2px solid var(--warning)}
.traffic-light.red{background:rgba(239,68,68,0.15);color:var(--danger);border:2px solid var(--danger)}
.health-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:var(--transition);margin-bottom:12px}
.health-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,0.2)}
.health-card.critical{border-left:3px solid var(--danger)}
.health-card.caution{border-left:3px solid var(--warning)}
.health-card.healthy{border-left:3px solid var(--success)}
.health-detail{max-height:0;overflow:hidden;transition:max-height 300ms ease-out}
.health-card.open .expand-arrow{transform:rotate(180deg)}
.health-card.open .health-detail{max-height:800px;padding-bottom:4px}
</style>
</head>

        <svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:currentColor"><path id="theme-icon-path" d="M6.76 4.84l-1.8-1.79-1.41 1.41 1.79 1.79 1.42-1.41zM4 10.5H1v2h3v-2zm9-9.95h-2V3.5h2V.55zm7.45 3.91l-1.41-1.41-1.79 1.79 1.41 1.41 1.79-1.79zm-3.21 3.74l.71.71-3.53 3.53-1.77-1.77.71-.71 1.06 1.06 2.82-2.82zm3.76.34v2h3v-2h-3zm-10-2.06l.71-.71 3.53 3.53-.71.71-3.53-3.53zM11 20.45h2V17.5h-2v2.95zm-5.65-.05l1.79-1.8-1.41-1.41-1.79 1.79 1.41 1.42z"/></svg>

async function saveNextAction(id){
  const panel=document.getElementById('oppDetailPanel');
  if(!panel)return;
  const descEl=panel.querySelector('.na-desc');
  const dateEl=panel.querySelector('.na-date');
  const o=summaryData.opportunities.find(x=>x.id===id);
  if(!o)return;
  const desc=(descEl?descEl.textContent.trim():'');
  const due=dateEl?dateEl.value:'';
  const status=o.nextActionStatus||'Planned';
  let na=desc;
  if(due)na+=` — by ${due}`;
  na+=` — [${status}]`;
  const res=await apiPut(`/api/opportunities/${encodeURIComponent(id)}`,{nextAction:na,nextActionDue:due,nextActionStatus:status});
  if(res.error)return showToast(res.error,'error');
  await loadAll();
  if(_activeOppId===id)openOppDetail(id);
  showToast('Updated');
}
async function cycleNextActionStatus(id){
  const cycle=['Planned','In Progress','Done'];
  const o=summaryData.opportunities.find(x=>x.id===id);
  if(!o)return;
  const curr=o.nextActionStatus||'计划中';
  const next=cycle[(cycle.indexOf(curr)+1)%cycle.length];
  const desc=(o.nextAction||'').replace(/by\s*\d{4}-\d{2}-\d{2}/,'').replace(/—\s*\[(Planned|In Progress|Done)\]/,'').replace(/\s*—\s*$/,'').trim();
  const due=o.nextActionDue||'';
  let na=desc;
  if(due)na+=` — by ${due}`;
  na+=` — [${next}]`;
  const res=await apiPut(`/api/opportunities/${encodeURIComponent(id)}`,{nextAction:na,nextActionDue:due,nextActionStatus:next});
  if(res.error)return showToast(res.error,'error');
  await loadAll();
  if(_activeOppId===id)openOppDetail(id);
  showToast('Updated');
}

// --- Helpers ---
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function escAttr(s){return String(s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;')}
function fmt$(v){const s=String(v||'').trim();let n=parseFloat(s.replace(/[^0-9.]/g,''))||0;const u=s.match(/[KkMm]$/);if(u){const c=u[0].toLowerCase();if(c==='k')n*=1000;else if(c==='m')n*=1000000}return '$'+n.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0})}
function fmtDate(d){if(!d)return'-';try{return new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}catch{return d}}
function daysSince(d){if(!d)return 999;const t=new Date(d+'T00:00:00');return Math.floor((Date.now()-t)/(1000*60*60*24))}
function stageColor(s){return{Discovery:'#3B82F6',Proposal:'#FBBF24',Negotiation:'#818CF8','Verbal Commit':'#22C55E',Won:'var(--success)',Lost:'var(--danger)'}[s]||'var(--text-muted)'}
function chipCls(active){return`display:inline-flex;align-items:center;gap:5px;padding:6px 16px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;transition:var(--transition);border:1px solid ${active?'var(--accent)':'var(--border)'};background:${active?'var(--accent-glow)':'var(--surface)'};color:${active?'var(--accent)':'var(--text-muted)'}`}

function md2html(md){
  if(!md)return '';
  const lines=escHtml(md).split('\n');
  let out='',inTable=false;
  for(let i=0;i<lines.length;i++){
    const ln=lines[i];
    const heading=ln.match(/^(#{1,3}) (.+)$/);
    if(heading){
      if(inTable){out+='</table>';inTable=false;}
      const tag='h'+heading[1].length;
      const sz={h1:'18px',h2:'16px',h3:'14px'}[tag];
      out+=`<${tag} style="font-size:${sz};font-weight:700;margin:14px 0 6px;color:var(--text-primary)">${heading[2]}</${tag}>`;
      continue;
    }
    const tblRow=ln.match(/^\|(.+)\|$/);
    if(tblRow){
      const cells=tblRow[1].split('|').map(c=>c.trim());
      if(cells.every(c=>/^[\-:]+$/.test(c))){continue;}
      if(!inTable){out+='<table style="border-collapse:collapse;margin:8px 0;width:100%">';inTable=true;}
      const isHead=!inTable||i===0;
      out+='<tr>'+cells.map(c=>`<td style="padding:4px 10px;border:1px solid var(--border);font-size:11px;${isHead?'font-weight:700;color:var(--text-secondary)':''}">${c}</td>`).join('')+'</tr>';
      continue;
    }
    if(inTable){out+='</table>';inTable=false;}
    let processed=ln
      .replace(/\*\*(.+?)\*\*/g,'<strong style="font-weight:700;color:var(--text-primary)">$1</strong>')
      .replace(/\*(.+?)\*/g,'<em>$1</em>')
      .replace(/`([^`]+)`/g,'<code style="font-family:var(--font-mono);font-size:11px;padding:1px 5px;border-radius:4px;background:var(--surface);border:1px solid var(--border)">$1</code>');
    if(processed.match(/^\- /)){
      out+=`<div style="padding:2px 0 2px 16px;text-indent:-12px">• ${processed.replace(/^\- /,'')}</div>`;
    }else if(processed.trim()===''){
      out+='<div style="margin:4px 0"></div>';
    }else{
      out+=`<p style="margin:2px 0;font-size:12px;line-height:1.7">${processed}</p>`;
    }
  }
  if(inTable)out+='</table>';
  return out;
}

// --- Radar Chart SVG Helper ---
function radarSVG(dims,values,maxR,color,strokeOnly){
  const n=dims.length,step=Math.PI*2/n,cx=maxR+8,cy=maxR+8;
  const rings=[0.25,0.5,0.75,1.0];
  let svg=`<svg width="${(maxR+8)*2}" height="${(maxR+8)*2}" viewBox="0 0 ${(maxR+8)*2} ${(maxR+8)*2}" style="overflow:visible">`;
  rings.forEach(r=>{
    const pts=[];
    for(let i=0;i<n;i++){const a=-Math.PI/2+step*i;pts.push(`${cx+maxR*r*Math.cos(a)},${cy+maxR*r*Math.sin(a)}`)}
    svg+=`<polygon points="${pts.join(' ')}" fill="none" stroke="var(--border)" stroke-width="0.5" opacity=".5"/>`;
  });
  for(let i=0;i<n;i++){const a=-Math.PI/2+step*i;svg+=`<line x1="${cx}" y1="${cy}" x2="${cx+maxR*Math.cos(a)}" y2="${cy+maxR*Math.sin(a)}" stroke="var(--border)" stroke-width="0.5" opacity=".4"/>`}
  const fillPts=[];
  for(let i=0;i<n;i++){const a=-Math.PI/2+step*i;const v=Math.min(values[i]||0,1);fillPts.push(`${cx+maxR*v*Math.cos(a)},${cy+maxR*v*Math.sin(a)}`)}
  if(!strokeOnly){
    svg+=`<polygon points="${fillPts.join(' ')}" fill="${color}22" stroke="${color}" stroke-width="1.5" opacity=".9"/>`;
  }else{
    svg+=`<polygon points="${fillPts.join(' ')}" fill="none" stroke="${color}" stroke-width="1.5" stroke-dasharray="3 2" opacity=".7"/>`;
  }
  for(let i=0;i<n;i++){const a=-Math.PI/2+step*i;const v=Math.min(values[i]||0,1);const dotColor=(v>0.6)?'var(--danger)':(v>0.3)?'var(--warning)':'var(--success)';svg+=`<circle cx="${cx+maxR*v*Math.cos(a)}" cy="${cy+maxR*v*Math.sin(a)}" r="2.5" fill="${dotColor}"/>`}
  for(let i=0;i<n;i++){const a=-Math.PI/2+step*i;const lbl=maxR+20;const tx=cx+lbl*Math.cos(a);const ty=cy+lbl*Math.sin(a);const anchor=Math.abs(a)<0.3?'middle':(Math.cos(a)>0.1?'start':(Math.cos(a)<-0.1?'end':'middle'));svg+=`<text x="${tx}" y="${ty}" text-anchor="${anchor}" dominant-baseline="central" fill="var(--text-muted)" font-size="8" font-family="var(--font-body)">${dims[i]}</text>`}
  svg+=`</svg>`;
  return svg;
}

function riskLevel(m){
  const critical=m.reqOverdue+m.reqGap+m.actDelayed+m.riskNoMit;
  const caution=m.reqDueSoon;
  const stale=0; // handled separately
  if(critical>=2)return'red';
  if(critical>=1||caution>=3)return'yellow';
  return'green';
}

function riskScore(m){
  const c=m.reqOverdue*4+m.reqGap*4+m.actDelayed*3+m.riskNoMit*4;
  const w=m.reqDueSoon*2+m.reqFollow*1+m.actOpen*1;
  return c+w;
}

function renderDashboard(){
  const d=summaryData;
  const opps=d.opportunities||[];
  const today=new Date().toISOString().split('T')[0];
  const staleDays=20;
  const clientList=[...new Set(opps.map(o=>o.client))].sort();
  const filterVal=window._dashFilter||'';

  function oppMetrics(o){
    let reqFollow=0,reqGap=0,reqOverdue=0,reqDueSoon=0,actOpen=0,actDelayed=0,riskNoMit=0;
    (o.meetings||[]).forEach(m=>{
      (m.requirements||[]).forEach(r=>{
        const rs=typeof r==='string'?'Open':(r.status||'Open');
        const rd=typeof r==='string'?'':(r.due||'');
        if(rs==='Gap')reqGap++;
        else if(rs!=='Confirmed')reqFollow++;
        if(rd&&rd<today&&rs!=='Confirmed')reqOverdue++;
        else if(rd&&rs!=='Confirmed'&&((new Date(rd)-new Date(today))/(86400000))<=7&&((new Date(rd)-new Date(today))/(86400000))>=0)reqDueSoon++;
      });
      (m.actionItems||[]).forEach(a=>{
        const st=a.status||'Open';
        if(st==='Open'||st==='In Progress')actOpen++;
        if(st==='Delayed'||(st==='Open'&&a.due&&a.due<today))actDelayed++;
      });
      (m.risks||[]).forEach(rk=>{
        if(!rk.mitigation||rk.mitigation==='(no mitigation yet)'||rk.mitigation.startsWith('(no'))riskNoMit++;
      });
    });
    const total=reqFollow+reqGap+reqOverdue+reqDueSoon+actOpen+actDelayed+riskNoMit;
    return{reqFollow,reqGap,reqOverdue,reqDueSoon,actOpen,actDelayed,riskNoMit,total};
  }

  function allActions(o){
    const items=[];
    (o.meetings||[]).forEach(m=>{
      (m.actionItems||[]).forEach(a=>{
        items.push({text:a.text,status:a.status||'Open',owner:a.owner||'',due:a.due||'',oppId:o.id,client:o.client,oppName:o.name});
      });
    });
    return items;
  }

  function openQuestions(o){
    const qs=[];
    (o.meetings||[]).forEach(m=>{
      (m.questions||[]).forEach(q=>{
        const qt=typeof q==='string'?q:(q.question||q.text||'');
        const qa=typeof q==='string'?'':(q.answer||'');
        if(!qa||qa==='(open)')qs.push({text:qt,oppId:o.id,client:o.client,oppName:o.name});
      });
    });
    return qs;
  }

  const filteredOpps=filterVal?opps.filter(o=>o.client===filterVal):opps;
  const archive=d.archive||{};
  const archiveWon=(archive.won||[]);
  const archiveLost=(archive.lost||[]);
  const fArchiveWon=filterVal?archiveWon.filter(a=>a.client===filterVal):archiveWon;
  const fArchiveLost=filterVal?archiveLost.filter(a=>a.client===filterVal):archiveLost;
  const fActive=filteredOpps.filter(o=>!['Won','Lost'].includes(o.stage));
  const fClosed=filteredOpps.filter(o=>['Won','Lost'].includes(o.stage));
  const fWon=fClosed.filter(o=>o.stage==='Won').length + fArchiveWon.length;
  const fLost=fClosed.filter(o=>o.stage==='Lost').length + fArchiveLost.length;
  const fWinRate=(fWon+fLost)>0?Math.round(fWon/(fWon+fLost)*100):0;
  const fLoseRate=(fWon+fLost)>0?Math.round(fLost/(fWon+fLost)*100):0;
  const fClients=new Set(fActive.map(o=>o.client));
  const fStale=fActive.filter(o=>{const la=getLastActivityDate(o);return daysSince(la)>staleDays;});

  let aReqFollow=0,aReqGap=0,aReqOverdue=0,aReqDueSoon=0,aActOpen=0,aActDelayed=0,aRiskNoMit=0;
  fActive.forEach(o=>{const m=oppMetrics(o);aReqFollow+=m.reqFollow;aReqGap+=m.reqGap;aReqOverdue+=m.reqOverdue;aReqDueSoon+=m.reqDueSoon;aActOpen+=m.actOpen;aActDelayed+=m.actDelayed;aRiskNoMit+=m.riskNoMit;});

  let html='';

  // === ALERT SIGNAL STRIP ===
  const criticals=[
    {label:'Overdue Reqs',count:aReqOverdue,color:'var(--danger)'},
    {label:'Delayed Actions',count:aActDelayed,color:'var(--danger)'},
    {label:'Req Gaps',count:aReqGap,color:'var(--danger)'},
    {label:'Unmitigated Risks',count:aRiskNoMit,color:'var(--danger)'},
    {label:'Due Soon',count:aReqDueSoon,color:'var(--warning)'},
    {label:'Open Actions',count:aActOpen,color:'var(--accent)'},
    {label:'Stale Opps',count:fStale.length,color:'var(--danger)'},
  ].filter(s=>s.count>0);

  if(criticals.length){
    const hasCritical=criticals.some(s=>s.color==='var(--danger)');
    html+=`<div class="dash-alert-strip${hasCritical?' has-critical':''}">`;
    criticals.forEach(s=>{
      const isDanger=s.color==='var(--danger)';
      html+=`<div class="dash-alert-item" style="background:${s.color}14;border:1px solid ${s.color}30;color:${s.color}">${isDanger?'<svg style="width:13px;height:13px;flex-shrink:0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>':''}${s.count} ${s.label}</div>`;
    });
    html+=`</div>`;
  }

  // Filter chips
  html+=`<div style="display:flex;gap:7px;align-items:center;margin-bottom:18px;flex-wrap:wrap">
    <span style="${chipCls(!filterVal)}" onclick="window._dashFilter='';renderView()">All</span>
    ${clientList.map(c=>`<span style="${chipCls(filterVal===c)}" onclick="window._dashFilter='${escAttr(c)}';renderView()">${escHtml(c)}</span>`).join('')}
  </div>`;

  // === STALE OPPORTUNITIES WARNING ===
  if(fStale.length>0){
    html+=`<div class="glass panel" style="margin-bottom:18px;border-left:3px solid var(--danger);padding:16px 20px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <svg style="width:18px;height:18px;color:var(--danger);flex-shrink:0" viewBox="0 0 24 24" fill="currentColor"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>
        <span style="font-size:14px;font-weight:700;color:var(--danger)">${fStale.length} Stale Opportunit${fStale.length>1?'ies':'y'}</span>
        <span style="font-size:11px;color:var(--text-muted);margin-left:4px">No activity in ${staleDays}+ days — sales attention needed</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px">`;
    fStale.forEach(o=>{
      const la=getLastActivityDate(o);
      const idle=daysSince(la);
      html+=`<div class="glass-sm opp-card" style="cursor:pointer;border-left:3px solid var(--danger)66" onclick="openOppDetail('${escAttr(o.id)}')">
        <div style="padding:10px 12px">
          <div style="font-size:13px;font-weight:600;color:var(--text-primary)">${escHtml(o.client)} <span style="color:var(--text-muted)">·</span> ${escHtml(o.name)}</div>
          <div style="display:flex;justify-content:space-between;margin-top:5px">
            <span style="font-size:10px;color:var(--text-muted)">${escHtml(o.stage||'')}</span>
            <span style="font-family:var(--font-mono);font-size:10px;color:var(--danger);font-weight:700">${idle}d idle</span>
          </div>
        </div>
      </div>`;
    });
    html+=`</div></div>`;
  }

  // KPI cards
  html+=`<div class="kpi-grid">
    <div class="glass kpi-card"><div class="label">Clients</div><div class="value">${fClients.size}</div><div class="delta">${fActive.length} active</div></div>
    <div class="glass kpi-card"><div class="label">Win Rate</div><div class="value" style="color:${fWinRate>=40?'var(--success)':fWinRate>=20?'var(--warning)':'var(--danger)'}">${fWinRate}%</div><div class="delta">${fWon} won / ${fLost} lost</div></div>
    <div class="glass kpi-card"><div class="label">Lose Rate</div><div class="value" style="color:${fLoseRate>50?'var(--danger)':fLoseRate>30?'var(--warning)':'var(--success)'}">${fLoseRate}%</div><div class="delta">${fLost} lost</div></div>
    <div class="glass kpi-card"><div class="label">Stale</div><div class="value" style="color:${fStale.length>0?'var(--danger)':'var(--success)'}">${fStale.length}</div><div class="delta">>${staleDays}d idle</div></div>
  </div>`;

  // Quarterly target card with quarter switching
  const qd=summaryData.quarterly||{};
  const qTargets=qd.targets||[];
  const qQuarters=qd.quarters||{};
  const qSelected=window._qSelect||qd.current||'';
  if(qTargets.length>0){
    const qi=qQuarters[qSelected]||{target:0,won:0,pipeline:0,gap:0};
    const qPct=qi.target>0?Math.min(Math.round(qi.won/qi.target*100),100):0;
    const qGapColor=qi.gap>0?'var(--danger)':'var(--success)';
    const qIdx=qTargets.findIndex(t=>t.quarter===qSelected);
    const qPrev=qIdx>0?qTargets[qIdx-1].quarter:'';
    const qNext=qIdx<qTargets.length-1?qTargets[qIdx+1].quarter:'';
    html+=`<div class="glass panel" style="margin-bottom:18px;padding:16px 20px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <h3 style="font-size:15px;font-weight:700;margin:0;display:flex;align-items:center;gap:6px"><svg style="width:16px;height:16px;color:var(--accent)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12l3 3 5-5"/></svg> ${qSelected} Target</h3>
        <div style="display:flex;align-items:center;gap:6px">
          ${qPrev?`<button style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xs);color:var(--text-secondary);cursor:pointer;padding:2px 8px;font-size:11px;font-family:var(--font-mono)" onclick="window._qSelect='${escAttr(qPrev)}';renderView()">◄ ${qPrev}</button>`:''}
          ${qNext?`<button style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xs);color:var(--text-secondary);cursor:pointer;padding:2px 8px;font-size:11px;font-family:var(--font-mono)" onclick="window._qSelect='${escAttr(qNext)}';renderView()">${qNext} ►</button>`:''}
          <button style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;padding:2px 4px" onclick="editTargets()" title="Edit targets">✎</button>
        </div>
      </div>
      <div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">
          <span style="font-size:13px;font-weight:600;color:var(--text-primary)">Achieved <span style="color:var(--success)">${qi.won}M</span> / Target ${qi.target}M</span>
          <span style="font-family:var(--font-mono);font-size:12px;font-weight:700;color:${qPct>=80?'var(--success)':qPct>=40?'var(--warning)':'var(--danger)'}">${qPct}%</span>
        </div>
        <div class="progress-bar" style="height:6px"><div class="progress-fill" style="width:${qPct}%;background:${qPct>=80?'var(--success)':qPct>=40?'var(--warning)':'var(--danger)'}"></div></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;font-size:11px">
        <div style="text-align:center;padding:6px;border-radius:var(--radius-sm);background:var(--success)0d"><div style="font-weight:700;color:var(--success)">Won</div><div style="font-family:var(--font-mono);font-size:14px;font-weight:700;color:var(--text-primary)">${qi.won}M</div></div>
        <div style="text-align:center;padding:6px;border-radius:var(--radius-sm);background:var(--warning)0d"><div style="font-weight:700;color:var(--warning)">Pipeline</div><div style="font-family:var(--font-mono);font-size:14px;font-weight:700;color:var(--text-primary)">${qi.pipeline}M</div></div>
        <div style="text-align:center;padding:6px;border-radius:var(--radius-sm);background:${qi.gap>0?'var(--danger)0d':'var(--surface)'}"><div style="font-weight:700;color:${qGapColor}">Gap</div><div style="font-family:var(--font-mono);font-size:14px;font-weight:700;color:var(--text-primary)">${Math.abs(qi.gap)}M</div></div>
      </div>
    </div>`;
  }

  // === SECTION: Client Overview ===
  const clientRows=[];
  [...fClients].sort().forEach(c=>{
    const cOpps=fActive.filter(o=>o.client===c);
    const cPipeline=cOpps.reduce((sum,o)=>{let v=parseFloat(String(o.budget||'0').replace(/[^0-9.]/g,''))||0;const u=String(o.budget||'').match(/[KkMm]$/);if(u){if(u[0].toLowerCase()==='k')v*=1000;else if(u[0].toLowerCase()==='m')v*=1000000}return sum+v},0);
    let cReqOpen=0,cReqGap=0,cReqOverdue=0,cActOpen=0,cActDelayed=0,cRiskNoMit=0,cOpenQ=0;
    cOpps.forEach(o=>{
      const m=oppMetrics(o);
      cReqOpen+=m.reqFollow;cReqGap+=m.reqGap;cReqOverdue+=m.reqOverdue;
      cActOpen+=m.actOpen;cActDelayed+=m.actDelayed;cRiskNoMit+=m.riskNoMit;
      cOpenQ+=openQuestions(o).length;
    });
    const isStale=cOpps.some(o=>fStale.includes(o));
    clientRows.push({client:c,count:cOpps.length,pipeline:cPipeline,stages:cOpps.map(o=>o.stage),reqOpen:cReqOpen,reqGap:cReqGap,reqOverdue:cReqOverdue,actOpen:cActOpen,actDelayed:cActDelayed,riskNoMit:cRiskNoMit,openQ:cOpenQ,stale:isStale});
  });
  if(clientRows.length){
    html+=`<div class="glass panel" style="margin-bottom:16px;overflow-x:auto">
      <h3 style="display:flex;align-items:center;gap:8px;font-size:15px"><svg style="width:16px;height:16px;color:var(--accent)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg> Client Overview</h3>
      <table class="data-table" style="margin-top:10px;min-width:680px">
        <tr><th>Client</th><th>Opps</th><th>Pipeline</th><th style="color:var(--text-secondary)">Open Reqs</th><th style="color:var(--danger)">Req Gaps</th><th style="color:var(--danger)">Overdue</th><th style="color:var(--accent)">Actions</th><th style="color:var(--danger)">Delayed</th><th style="color:var(--danger)">Risks</th><th style="color:var(--warning)">Open Qs</th><th>Status</th></tr>`;
    clientRows.forEach(r=>{
      const stageBadges=r.stages.map(s=>`<span style="font-size:9px;padding:1px 4px;border-radius:6px;background:${stageColor(s)}14;color:${stageColor(s)};margin-right:2px">${s}</span>`).join('');
      const alertCount=r.reqGap+r.reqOverdue+r.actDelayed+r.riskNoMit;
      const statusBadge=r.stale?'<span style="font-size:9px;padding:2px 6px;border-radius:8px;background:var(--danger)18;color:var(--danger);font-weight:700">STALE</span>':alertCount>0?`<span style="font-size:9px;padding:2px 6px;border-radius:8px;background:var(--warning)18;color:var(--warning);font-weight:600">${alertCount} issue${alertCount>1?'s':''}</span>`:'<span style="font-size:9px;padding:2px 6px;border-radius:8px;background:var(--success)18;color:var(--success)">OK</span>';
      html+=`<tr style="cursor:pointer" onclick="window._dashFilter='${escAttr(r.client)}';renderView()">
        <td style="font-weight:700;color:var(--text-primary);white-space:nowrap">${escHtml(r.client)}</td>
        <td><span style="font-family:var(--font-mono);font-size:12px;font-weight:600">${r.count}</span> ${stageBadges}</td>
        <td style="font-family:var(--font-mono);font-size:12px;font-weight:600;color:var(--text-primary)">${fmt$(r.pipeline)}</td>
        <td style="font-family:var(--font-mono);font-size:12px;color:var(--text-secondary)">${r.reqOpen||'-'}</td>
        <td style="font-family:var(--font-mono);font-size:12px;color:${r.reqGap?'var(--danger)':'var(--text-muted)'};font-weight:${r.reqGap?700:400}">${r.reqGap||'-'}</td>
        <td style="font-family:var(--font-mono);font-size:12px;color:${r.reqOverdue?'var(--danger)':'var(--text-muted)'};font-weight:${r.reqOverdue?700:400}">${r.reqOverdue||'-'}</td>
        <td style="font-family:var(--font-mono);font-size:12px;color:var(--accent)">${r.actOpen||'-'}</td>
        <td style="font-family:var(--font-mono);font-size:12px;color:${r.actDelayed?'var(--danger)':'var(--text-muted)'};font-weight:${r.actDelayed?700:400}">${r.actDelayed||'-'}</td>
        <td style="font-family:var(--font-mono);font-size:12px;color:${r.riskNoMit?'var(--danger)':'var(--text-muted)'};font-weight:${r.riskNoMit?700:400}">${r.riskNoMit||'-'}</td>
        <td style="font-family:var(--font-mono);font-size:12px;color:${r.openQ?'var(--warning)':'var(--text-muted)'}">${r.openQ||'-'}</td>
        <td>${statusBadge}</td>
      </tr>`;
    });
    html+=`</table></div>`;
  }

  // === SECTION: Next Action Timeline ===
  const nextActions=fActive.map(o=>{
    const due=o.nextActionDue||'';
    const desc=(o.nextAction||'').replace(/by\s*\d{4}-\d{2}-\d{2}/,'').replace(/—\s*\[(Planned|In Progress|Done)\]/,'').replace(/\s*—\s*$/,'').trim();
    const status=o.nextActionStatus||'Planned';
    return{id:o.id,client:o.client,name:o.name,stage:o.stage,due,desc,status,full:o.nextAction||'',prob:parseInt(String(o.probability||'0').replace('%',''))||0,close:o.targetClose||''};
  }).filter(a=>a.due).sort((a,b)=>a.due.localeCompare(b.due));

  const overdueActions=nextActions.filter(a=>a.due<today);
  const dueSoonActions=nextActions.filter(a=>a.due>=today&&((new Date(a.due)-new Date(today))/(86400000))<=14);
  const laterActions=nextActions.filter(a=>a.due>=today&&((new Date(a.due)-new Date(today))/(86400000))>14);

  if(nextActions.length){
    html+=`<div class="glass panel" style="margin-bottom:16px">
      <h3 style="display:flex;align-items:center;gap:8px;font-size:15px"><svg style="width:17px;height:17px;color:var(--accent)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Next Actions</h3>
      <div style="display:flex;flex-direction:column;gap:4px;margin-top:12px">`;

    const renderAction=(a,cardCls)=>{
      const overdue=a.due<today;
      const days=a.due<today?Math.abs(Math.round((new Date(today)-new Date(a.due))/(86400000))):Math.round((new Date(a.due)-new Date(today))/(86400000));
      const dayLabel=overdue?`${days}d overdue`:`${days}d left`;
      const dayColor=overdue?'var(--danger)':days<=3?'var(--danger)':days<=7?'var(--warning)':'var(--text-muted)';
      const sc=stageColor(a.stage);
      const probBadge=a.prob?`<span style="font-family:var(--font-mono);font-size:11px;padding:2px 7px;border-radius:8px;background:${a.prob>=60?'var(--success)':a.prob>=30?'var(--warning)':'var(--danger)'}18;color:${a.prob>=60?'var(--success)':a.prob>=30?'var(--warning)':'var(--danger)'}">${a.prob}%</span>`:'';
      const statusBadge=a.status?`<span class="status-badge" style="font-size:9px;padding:1px 6px;border-radius:8px;${a.status==='Done'?'background:var(--success)14;color:var(--success);border:1px solid var(--success)25':a.status==='In Progress'?'background:var(--warning)14;color:var(--warning);border:1px solid var(--warning)25':'background:var(--accent)0d;color:var(--accent);border:1px solid var(--accent)20'}">${escHtml(a.status)}</span>`:'';
      html+=`<div class="dash-action-card ${cardCls}" onclick="openOppDetail('${escAttr(a.id)}')">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:10px">
          <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0">
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
                <span style="font-size:14px;font-weight:700;color:var(--text-primary)">${escHtml(a.client)}</span>
                <span style="color:var(--text-muted);font-size:12px">/ ${escHtml(a.name)}</span>
                <span class="status-badge" style="background:${sc}14;color:${sc};border:1px solid ${sc}25;font-size:10px">${a.stage}</span>
                ${probBadge}
                ${statusBadge}
              </div>
              <div style="font-size:13px;color:var(--text-secondary);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(a.desc||a.full)}</div>
            </div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0">
            <span style="font-family:var(--font-mono);font-size:13px;color:${dayColor};${overdue?'font-weight:700':''}">${fmtDate(a.due)}</span>
            <span style="font-size:11px;color:${dayColor}">${dayLabel}</span>
          </div>
        </div>
      </div>`;
    };

    if(overdueActions.length){
      html+=`<div style="font-size:11px;font-weight:700;color:var(--danger);text-transform:uppercase;letter-spacing:.8px;padding:6px 0 2px">Overdue (${overdueActions.length})</div>`;
      overdueActions.forEach(a=>renderAction(a,'overdue'));
    }
    if(dueSoonActions.length){
      html+=`<div style="font-size:11px;font-weight:700;color:var(--warning);text-transform:uppercase;letter-spacing:.8px;padding:6px 0 2px">Due Soon (${dueSoonActions.length})</div>`;
      dueSoonActions.forEach(a=>renderAction(a,'due-soon'));
    }
    if(laterActions.length){
      html+=`<div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;padding:6px 0 2px">Upcoming (${laterActions.length})</div>`;
      laterActions.forEach(a=>renderAction(a,'upcoming'));
    }

    html+=`</div></div>`;
  }

  // === SECTION: Issues Needing Attention (Combined) ===
  const allOpenActions=[];
  fActive.forEach(o=>{
    allActions(o).filter(a=>a.status==='Open'||a.status==='In Progress').forEach(a=>{
      let overdueDays=0;
      if(a.due){
        const diff=Math.round((new Date(today)-new Date(a.due))/(86400000));
        if(diff>0)overdueDays=diff;
      }
      allOpenActions.push({text:a.text,status:a.status,owner:a.owner,due:a.due,overdueDays,prob:parseInt(String(o.probability||'0').replace('%',''))||0,stage:o.stage,client:o.client,oppId:o.id});
    });
  });
  allOpenActions.sort((a,b)=>{
    if(a.overdueDays!==b.overdueDays)return b.overdueDays-a.overdueDays;
    if(a.due&&b.due)return a.due.localeCompare(b.due);
    return 0;
  });

  const allDelayedItems=[];
  fActive.forEach(o=>{
    allActions(o).filter(a=>a.status==='Delayed').forEach(a=>{
      let overdueDays=0;
      if(a.due){
        const diff=Math.round((new Date(today)-new Date(a.due))/(86400000));
        if(diff>0) overdueDays=diff;
      }
      if(overdueDays===0){
        const fallback=o.updated||'';
        if(fallback) overdueDays=Math.max(1,Math.round((new Date(today)-new Date(fallback))/(86400000)));
        else overdueDays=1;
      }
      allDelayedItems.push({text:a.text,owner:a.owner,due:a.due,overdueDays,prob:parseInt(String(o.probability||'0').replace('%',''))||0,stage:o.stage,client:o.client,oppId:o.id});
    });
  });
  allDelayedItems.sort((a,b)=>b.overdueDays-a.overdueDays);

  const allOpenQs=[];
  fActive.forEach(o=>{openQuestions(o).forEach(q=>allOpenQs.push({...q,stage:o.stage}))});

  const hasIssues=allDelayedItems.length||allOpenQs.length||allOpenActions.length;

  if(hasIssues){
    const hasCritical=allDelayedItems.length>0;
    const issueBorder=hasCritical?'rgba(239,68,68,0.15)':'rgba(251,191,36,0.12)';
    html+=`<div class="glass panel dash-issues-panel" style="margin-bottom:16px;border:1px solid ${issueBorder}">
      <h3 style="display:flex;align-items:center;gap:8px;font-size:15px;color:${hasCritical?'var(--danger)':'var(--warning)'}"><svg style="width:17px;height:17px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> Action Items & Issues</h3>
      <div style="margin-top:10px">`;

    if(allDelayedItems.length){
      html+=`<div style="font-size:11px;font-weight:700;color:var(--danger);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Delayed Actions (${allDelayedItems.length})</div>`;
      allDelayedItems.forEach(a=>{
        const sc=stageColor(a.stage||'');
        html+=`<div class="issue-row" onclick="openOppDetail('${escAttr(a.oppId)}')">
          <span class="issue-type" style="background:var(--danger)14;color:var(--danger);border:1px solid var(--danger)30">DELAYED</span>
          <span style="font-family:var(--font-mono);font-size:13px;font-weight:700;color:var(--danger);min-width:44px;flex-shrink:0">${a.overdueDays}d</span>
          <span style="flex:1;font-size:13px;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(a.text)}</span>
          ${a.owner?`<span style="font-size:12px;color:var(--text-muted);flex-shrink:0">${escHtml(a.owner)}</span>`:''}
          <span style="font-size:12px;color:var(--text-muted);flex-shrink:0">${escHtml(a.client)}</span>
        </div>`;
      });
    }

    if(allOpenQs.length){
      html+=`<div style="font-size:11px;font-weight:700;color:var(--warning);text-transform:uppercase;letter-spacing:.5px;margin:${allDelayedItems.length?'12':'0'}px 0 6px 0">Open Questions (${allOpenQs.length})</div>`;
      allOpenQs.forEach(q=>{
        html+=`<div class="issue-row" onclick="openOppDetail('${escAttr(q.oppId)}')">
          <span class="issue-type" style="background:var(--warning)14;color:var(--warning);border:1px solid var(--warning)30">QUESTION</span>
          <span style="flex:1;font-size:13px;color:var(--text-secondary)">${escHtml(q.text)}</span>
          <span style="font-size:12px;color:var(--text-muted);flex-shrink:0">${escHtml(q.client)}</span>
        </div>`;
      });
    }

    if(allOpenActions.length){
      const maxShow=8;
      const shown=allOpenActions.slice(0,maxShow);
      const remaining=allOpenActions.length-maxShow;
      html+=`<div style="font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin:${(allDelayedItems.length||allOpenQs.length)?'12':'0'}px 0 6px 0">Open Actions (${allOpenActions.length})</div>`;
      shown.forEach(a=>{
        const isOverdue=a.overdueDays>0;
        const dueLabel=a.due?fmtDate(a.due):'';
        const dueClr=isOverdue?'var(--danger)':'var(--text-muted)';
        html+=`<div class="issue-row" onclick="openOppDetail('${escAttr(a.oppId)}')">
          <span class="issue-type" style="background:var(--accent)14;color:var(--accent);border:1px solid var(--accent)30">${a.status==='In Progress'?'IN PROG':'OPEN'}</span>
          ${isOverdue?`<span style="font-family:var(--font-mono);font-size:11px;font-weight:700;color:var(--danger);min-width:36px;flex-shrink:0">${a.overdueDays}d!</span>`:''}
          <span style="flex:1;font-size:13px;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(a.text)}</span>
          ${a.owner?`<span style="font-size:11px;color:var(--text-muted);flex-shrink:0">${escHtml(a.owner)}</span>`:''}
          ${dueLabel?`<span style="font-family:var(--font-mono);font-size:10px;color:${dueClr};flex-shrink:0">${dueLabel}</span>`:''}
          <span style="font-size:12px;color:var(--text-muted);flex-shrink:0">${escHtml(a.client)}</span>
        </div>`;
      });
      if(remaining>0){
        html+=`<div style="font-size:11px;color:var(--text-muted);padding:4px 0;text-align:center">+${remaining} more action items</div>`;
      }
    }

    html+=`</div></div>`;
  }

  // === 3-column grid: Pipeline | Risk Radar | Alerts ===
  html+=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px">`;

  // Pipeline stage
  const stageData=['Discovery','Proposal','Negotiation','Verbal Commit'].map(s=>({
    stage:s,count:fActive.filter(o=>o.stage===s).length,color:stageColor(s),
    value:fActive.filter(o=>o.stage===s).reduce((sum,o)=>{
      let v=parseFloat(String(o.budget||'0').replace(/[^0-9.]/g,''))||0;
      const u=String(o.budget||'').match(/[KkMm]$/);
      if(u){if(u[0].toLowerCase()==='k')v*=1000;else if(u[0].toLowerCase()==='m')v*=1000000}
      return sum+v;
    },0)
  })).filter(s=>s.count>0);

  if(stageData.length){
    const maxCount=Math.max(...stageData.map(s=>s.count),1);
    html+=`<div class="glass panel"><h3 style="font-size:15px">Pipeline</h3>
      <div style="display:flex;flex-direction:column;gap:7px;margin-top:10px">`;
    stageData.forEach(s=>{
      const w=Math.max(Math.round(s.count/maxCount*100),10);
      html+=`<div style="display:flex;align-items:center;gap:10px">
        <span style="width:74px;font-size:12px;color:var(--text-secondary);text-align:right;flex-shrink:0">${s.stage}</span>
        <div style="flex:1;height:24px;border-radius:4px;overflow:hidden;background:var(--surface)">
          <div style="width:${w}%;height:100%;border-radius:4px;background:${s.color};display:flex;align-items:center;justify-content:center">
            <span style="font-family:var(--font-mono);font-size:12px;font-weight:700;color:#fff">${s.count}</span>
          </div>
        </div>
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted);flex-shrink:0">${fmt$(s.value*1000)}</span>
      </div>`;
    });
    html+=`</div></div>`;
  }else{
    html+=`<div class="glass panel" style="text-align:center;padding:32px"><div style="font-size:13px;color:var(--text-muted)">No active pipeline</div></div>`;
  }

  // Risk Radar
  const radarDims=['Reqs','Gap','Overdue','Due','Actions','Delayed','Risks'];
  const radarKeys=['reqFollow','reqGap','reqOverdue','reqDueSoon','actOpen','actDelayed','riskNoMit'];
  const oppColors=['#6366F1','#3B82F6','#8B5CF6','#F59E0B','#10B981'];
  const maxVals=radarKeys.map(k=>Math.max(...fActive.map(o=>oppMetrics(o)[k]),1));

  if(fActive.length>0){
    const maxR=56;
    const oppRadarData=fActive.map((o,idx)=>{
      const m=oppMetrics(o);
      return{
        id:o.id,client:o.client,name:o.name,
        values:radarKeys.map((k,i)=>Math.min(m[k]/maxVals[i],1)),
        color:oppColors[idx%oppColors.length],
        level:riskLevel(m),
        score:riskScore(m)
      };
    });

    oppRadarData.sort((a,b)=>a.score-b.score);

    const n=7,step=Math.PI*2/n,cx=140,cy=130;
    const rings=[0.25,0.5,0.75,1.0];
    const svgW=320,svgH=300;
    let svg=`<svg width="100%" viewBox="0 0 ${svgW} ${svgH}" style="max-width:${svgW}px;display:block">`;
    // zone backgrounds: green inner, yellow mid, red outer
    const zoneColors=['#22C55E08','#FBBF2408','#EF444408'];
    const zoneRadii=[0.35,0.7,1.0];
    zoneRadii.forEach((zr,zi)=>{
      const pts=[];
      for(let i=0;i<n;i++){const a=-Math.PI/2+step*i;pts.push(`${cx+maxR*zr*Math.cos(a)},${cy+maxR*zr*Math.sin(a)}`)}
      svg+=`<polygon points="${pts.join(' ')}" fill="${zoneColors[zi]}"/>`;
    });
    rings.forEach(r=>{
      const pts=[];
      for(let i=0;i<n;i++){const a=-Math.PI/2+step*i;pts.push(`${cx+maxR*r*Math.cos(a)},${cy+maxR*r*Math.sin(a)}`)}
      svg+=`<polygon points="${pts.join(' ')}" fill="none" stroke="var(--border)" stroke-width="0.5" opacity=".4"/>`;
    });
    for(let i=0;i<n;i++){const a=-Math.PI/2+step*i;svg+=`<line x1="${cx}" y1="${cy}" x2="${cx+maxR*Math.cos(a)}" y2="${cy+maxR*Math.sin(a)}" stroke="var(--border)" stroke-width="0.5" opacity=".3"/>`}
    oppRadarData.forEach(od=>{
      const pts=[];
      for(let i=0;i<n;i++){const a=-Math.PI/2+step*i;const v=od.values[i];pts.push(`${cx+maxR*v*Math.cos(a)},${cy+maxR*v*Math.sin(a)}`)}
      svg+=`<polygon points="${pts.join(' ')}" fill="${od.color}18" stroke="${od.color}" stroke-width="1.5" opacity=".8"/>`;
      for(let i=0;i<n;i++){const a=-Math.PI/2+step*i;const v=od.values[i];if(v>0.01)svg+=`<circle cx="${cx+maxR*v*Math.cos(a)}" cy="${cy+maxR*v*Math.sin(a)}" r="2.5" fill="${od.color}"/>`}
    });
    for(let i=0;i<n;i++){const a=-Math.PI/2+step*i;const lbl=maxR+38;const tx=cx+lbl*Math.cos(a);const ty=cy+lbl*Math.sin(a);const anchor=Math.abs(Math.cos(a))<0.15?'middle':(Math.cos(a)>0?'start':'end');const dy=Math.sin(a)<-0.5?-3:Math.sin(a)>0.5?4:0;svg+=`<text x="${tx}" y="${ty+dy}" text-anchor="${anchor}" dominant-baseline="central" fill="var(--text-muted)" font-size="11" font-family="var(--font-body)">${radarDims[i]}</text>`}
    svg+=`</svg>`;

    html+=`<div class="glass panel">
      <h3 style="display:flex;align-items:center;gap:8px;font-size:15px"><svg style="width:16px;height:16px;color:var(--danger)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> Risk Radar</h3>
      <div style="display:flex;gap:12px;align-items:flex-start;margin-top:8px;flex-wrap:wrap">
        <div style="flex-shrink:0">${svg}</div>
        <div style="display:flex;flex-direction:column;gap:5px;flex:1;min-width:130px">
          ${oppRadarData.slice().reverse().map(od=>{
            const m=fActive.find(o=>o.id===od.id);
            const om=m?oppMetrics(m):{};
            const worstKey=radarKeys.find((k,i)=>od.values[i]===Math.max(...od.values));
            const worstVal=om[worstKey]||0;
            const worstLabel=radarDims[radarKeys.indexOf(worstKey)];
            return`<div style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:4px 6px;border-radius:6px;transition:var(--transition)" onclick="openOppDetail('${escAttr(od.id)}')" onmouseenter="this.style.background='var(--surface)'" onmouseleave="this.style.background='transparent'">
              <div class="traffic-light ${od.level}" title="${od.level==='red'?'Critical':od.level==='yellow'?'Caution':'Healthy'}">${od.level==='red'?'!':od.level==='yellow'?'~':'✓'}</div>
              <span style="flex:1;font-size:12px;font-weight:600;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(od.client)}</span>
              <span style="font-size:9px;color:var(--text-muted);white-space:nowrap">${worstVal} ${worstLabel}</span>
              <span style="font-family:var(--font-mono);font-size:10px;color:${od.color}">${od.score}</span>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>`;
  }else{
    html+=`<div class="glass panel" style="text-align:center;padding:32px"><div style="font-size:13px;color:var(--text-muted)">No active opportunities</div></div>`;
  }

  // Alert donut
  const totalAlerts=aReqFollow+aReqGap+aReqOverdue+aReqDueSoon+aActOpen+aActDelayed+aRiskNoMit;
  if(totalAlerts>0){
    const alertSlices=[
      {label:'Reqs to follow',count:aReqFollow,color:'#3B82F6'},
      {label:'Req Gaps',count:aReqGap,color:'#EF4444'},
      {label:'Overdue Reqs',count:aReqOverdue,color:'#DC2626'},
      {label:'Due Soon',count:aReqDueSoon,color:'#FBBF24'},
      {label:'Open Actions',count:aActOpen,color:'#6366F1'},
      {label:'Delayed Actions',count:aActDelayed,color:'#F97316'},
      {label:'Unmitigated Risks',count:aRiskNoMit,color:'#B91C1C'},
    ].filter(s=>s.count>0);

    const r=62,c=2*Math.PI*r,cx=84,cy=84;
    let cumPct=0,arcs='';
    alertSlices.forEach(s=>{
      const pct=s.count/totalAlerts;
      const dash=c*pct;
      const offset=-c*cumPct;
      arcs+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="22" stroke-dasharray="${dash} ${c-dash}" stroke-dashoffset="${offset}" opacity=".85"/>`;
      cumPct+=pct;
    });

    html+=`<div class="glass panel">
      <h3 style="display:flex;align-items:center;gap:8px;font-size:15px"><svg style="width:16px;height:16px;color:var(--accent)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg> Alert Breakdown</h3>
      <div style="display:flex;gap:16px;align-items:center;margin-top:12px;flex-wrap:wrap">
        <div style="flex-shrink:0;position:relative">
          <svg width="168" height="168" viewBox="0 0 168 168" style="transform:rotate(-90deg)">${arcs}</svg>
          <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
            <span style="font-family:var(--font-mono);font-size:30px;font-weight:700;color:var(--text-primary)">${totalAlerts}</span>
            <span style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px">Alerts</span>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;flex:1;min-width:130px">
          ${alertSlices.map(s=>`<div style="display:flex;align-items:center;gap:8px">
            <span style="width:9px;height:9px;border-radius:2px;background:${s.color};flex-shrink:0"></span>
            <span style="font-size:13px;color:var(--text-secondary);flex:1">${s.label}</span>
            <span style="font-family:var(--font-mono);font-size:14px;font-weight:600;color:${s.color}">${s.count}</span>
          </div>`).join('')}
        </div>
      </div>
    </div>`;
  }else{
    html+=`<div class="glass panel" style="text-align:center;padding:28px">
      <svg style="width:28px;height:28px;color:var(--success);margin-bottom:6px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      <div style="font-size:13px;font-weight:600;color:var(--success)">All Clear</div>
      <div style="font-size:11px;color:var(--text-muted);margin-top:2px">No active alerts</div>
    </div>`;
  }

  html+=`</div>`; // end 3-col grid

  // === Closing Urgency (full-width compact row) ===
  const quarterEnd={Q1:'-03-31',Q2:'-06-30',Q3:'-09-30',Q4:'-12-31'};
  const closingOpps=fActive.map(o=>{
    const close=o.targetClose||'';
    const prob=parseInt(String(o.probability||'0').replace('%',''))||0;
    let daysToClose=999;
    if(close){
      const m=close.match(/(\d{4})-Q(\d)/);
      if(m) daysToClose=Math.round((new Date(m[1]+quarterEnd['Q'+m[2]])-new Date(today))/(86400000));
    }
    return{id:o.id,client:o.client,name:o.name,close,prob,daysToClose,stage:o.stage};
  }).filter(o=>o.close).sort((a,b)=>a.daysToClose-b.daysToClose);

  if(closingOpps.length){
    html+=`<div class="glass panel" style="margin-bottom:16px">
      <h3 style="display:flex;align-items:center;gap:8px;font-size:15px"><svg style="width:15px;height:15px;color:var(--warning)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Closing Urgency</h3>
      <div style="display:flex;gap:12px;margin-top:10px;overflow-x:auto;padding-bottom:4px">`;
    closingOpps.forEach(o=>{
      const sc=stageColor(o.stage);
      const pastTarget=o.daysToClose<0;
      const urgent=o.daysToClose<=30;
      const barColor=pastTarget?'var(--danger)':urgent?'var(--warning)':'var(--info)';
      const daysLabel=pastTarget?Math.abs(o.daysToClose)+'d past':o.daysToClose+'d';
      html+=`<div style="min-width:160px;flex:1;cursor:pointer;padding:10px 12px;border-radius:var(--radius-sm);background:var(--surface-2);border-left:3px solid ${barColor}" onclick="openOppDetail('${escAttr(o.id)}')">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
          <span style="font-size:12px;font-weight:700;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(o.client)}</span>
          <span style="font-family:var(--font-mono);font-size:11px;padding:1px 5px;border-radius:6px;background:${o.prob>=60?'var(--success)':o.prob>=30?'var(--warning)':'var(--danger)'}18;color:${o.prob>=60?'var(--success)':o.prob>=30?'var(--warning)':'var(--danger)'}">${o.prob}%</span>
        </div>
        <div style="font-size:11px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(o.name)}</div>
        <div style="display:flex;align-items:center;gap:6px;margin-top:6px">
          <div style="flex:1;height:5px;border-radius:3px;overflow:hidden;background:var(--surface)">
            <div style="width:${Math.min(Math.abs(o.daysToClose)/365*100,100)}%;height:100%;border-radius:3px;background:${barColor};opacity:.6"></div>
          </div>
          <span style="font-family:var(--font-mono);font-size:11px;font-weight:700;color:${barColor};flex-shrink:0">${daysLabel}</span>
        </div>
      </div>`;
    });
    html+=`</div></div>`;
  }

  // === SECTION: Opportunity Health — Issue Bars + Traffic Light Cards ===
  const barOpps=fActive;
  if(barOpps.length){
    const hDims=['Open Reqs','Gaps','Overdue','Due Soon','Actions','Delayed','Risks'];
    const hKeys=['reqFollow','reqGap','reqOverdue','reqDueSoon','actOpen','actDelayed','riskNoMit'];
    const hMaxVals=hKeys.map(k=>Math.max(...barOpps.map(o=>oppMetrics(o)[k]),1));

    html+=`<div style="margin-bottom:16px">
      <h3 style="font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px"><svg style="width:18px;height:18px;color:var(--accent)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg> Opportunity Health</h3>`;

    barOpps.sort((a,b)=>riskScore(oppMetrics(b))-riskScore(oppMetrics(a)));

    barOpps.forEach(o=>{
      const m=oppMetrics(o);
      const sc=stageColor(o.stage);
      const isStale=fStale.includes(o);
      const probPct=parseInt(String(o.probability||'0').replace('%',''))||0;
      const lvl=riskLevel(m);
      const sc2=riskScore(m);
      const fillColor=lvl==='red'?'#EF4444':lvl==='yellow'?'#FBBF24':'#22C55E';

      // issue bar chart
      const barH=13,gap=2,barW=150,svgW=barW+20,svgH=(hDims.length)*(barH+gap)+18;
      let svg=`<svg width="100%" viewBox="0 0 ${svgW} ${svgH}" style="max-width:${svgW}px;display:block">`;
      // health score bar
      const scorePct=100-sc2;
      const scoreW=scorePct/100*barW;
      svg+=`<rect x="0" y="0" width="${barW}" height="10" rx="5" fill="var(--surface)" opacity=".6"/>`;
      svg+=`<rect x="0" y="0" width="${scoreW}" height="10" rx="5" fill="${fillColor}" opacity=".45"/>`;
      svg+=`<text x="${barW+3}" y="7" text-anchor="start" dominant-baseline="central" fill="${fillColor}" font-size="8" font-family="var(--font-mono)" font-weight="700">${scorePct}</text>`;
      const offsetY=14;
      hKeys.forEach((k,i)=>{
        const val=m[k]||0;
        const w=Math.min(val/hMaxVals[i],1)*barW;
        const y=offsetY+i*(barH+gap);
        const c=i===1||i===2||i===5||i===6?'var(--danger)':i===3?'var(--warning)':'var(--accent)';
        svg+=`<rect x="0" y="${y}" width="${barW}" height="${barH}" rx="3" fill="var(--surface)" opacity=".4"/>`;
        if(val>0)svg+=`<rect x="0" y="${y}" width="${w}" height="${barH}" rx="3" fill="${c}" opacity=".3"/>`;
        svg+=`<text x="${val>0?4:6}" y="${y+barH/2+1}" text-anchor="start" dominant-baseline="central" fill="${val>0?'var(--text-primary)':'var(--text-muted)'}" font-size="8" font-family="var(--font-body)">${val>0?val+' '+hDims[i]:hDims[i]}</text>`;
      });
      svg+=`</svg>`;

      // collect risk details for expand
      const criticalItems=[];
      const cautionItems=[];
      (o.meetings||[]).forEach(mt=>{
        (mt.requirements||[]).forEach(r=>{
          const rs=typeof r==='string'?'Open':(r.status||'Open');
          const rd=typeof r==='string'?'':(r.due||'');
          const rt=typeof r==='string'?r:r.text;
          if(rs==='Gap')criticalItems.push({icon:'gap',text:rt,due:rd});
          else if(rd&&rd<today&&rs!=='Confirmed')criticalItems.push({icon:'overdue',text:rt,due:rd});
          else if(rd&&rs!=='Confirmed'&&((new Date(rd)-new Date(today))/(86400000))<=7&&((new Date(rd)-new Date(today))/(86400000))>=0)cautionItems.push({icon:'soon',text:rt,due:rd});
        });
        (mt.actionItems||[]).forEach(a=>{
          if(a.status==='Delayed')criticalItems.push({icon:'delayed',text:a.text,due:a.due||'',owner:a.owner||''});
        });
        (mt.risks||[]).forEach(rk=>{
          if(!rk.mitigation||rk.mitigation==='(no mitigation yet)'||rk.mitigation.startsWith('(no'))criticalItems.push({icon:'risk',text:rk.risk});
        });
      });

      const levelLabel=lvl==='red'?'Critical':lvl==='yellow'?'Caution':'Healthy';
      const levelDesc=lvl==='red'?'Immediate attention needed':lvl==='yellow'?'Monitor closely':'On track';
      const issueCount=criticalItems.length+cautionItems.length;

      html+=`<div class="health-card ${lvl}" onclick="this.classList.toggle('open');event.stopPropagation()" style="position:relative">
        <div style="display:flex;gap:14px;align-items:center">
          <div style="flex-shrink:0">
            <div class="traffic-light ${lvl}" title="${levelLabel}">${lvl==='red'?'!':lvl==='yellow'?'~':'✓'}</div>
          </div>
          <div style="flex-shrink:0;min-width:170px">
            <div style="font-size:9px;color:var(--text-muted);margin-bottom:3px;font-family:var(--font-mono)">${hDims.join('  ')}</div>
            ${svg}
          </div>
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
              ${isStale?'<svg style="width:13px;height:13px;color:var(--danger);flex-shrink:0" viewBox="0 0 24 24" fill="currentColor"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>':''}
              <span style="font-size:14px;font-weight:700;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(o.client)}</span>
              <span style="color:var(--text-muted);font-weight:300">/</span>
              <span style="font-size:12px;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(o.name)}</span>
            </div>
            <div style="display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap">
              <span class="status-badge" style="background:${sc}14;color:${sc};border:1px solid ${sc}25;font-size:10px">${o.stage}${o.daysInStage>0?` · ${o.daysInStage}d`:''}</span>
              ${probPct?`<span style="font-family:var(--font-mono);font-size:10px;padding:1px 6px;border-radius:7px;background:${probPct>=60?'var(--success)':probPct>=30?'var(--warning)':'var(--danger)'}18;color:${probPct>=60?'var(--success)':probPct>=30?'var(--warning)':'var(--danger)'}">${probPct}%</span>`:''}
              <span style="font-size:11px;font-weight:700;color:${fillColor}">${levelLabel}</span>
              ${issueCount?`<span style="font-size:10px;padding:1px 6px;border-radius:8px;background:${fillColor}14;color:${fillColor}">${issueCount} issue${issueCount>1?'s':''}</span>`:''}
              <span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted)">Score ${sc2}</span>
            </div>
          </div>
          <svg style="width:14px;height:14px;color:var(--text-muted);flex-shrink:0;transition:transform 200ms" class="expand-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="health-detail" onclick="event.stopPropagation()">
          <div style="margin-top:12px;border-top:1px solid var(--border);padding-top:10px">`;

      if(criticalItems.length){
        html+=`<div style="margin-bottom:8px"><div style="font-size:11px;font-weight:700;color:var(--danger);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;display:flex;align-items:center;gap:5px"><svg style="width:12px;height:12px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> Critical (${criticalItems.length})</div>`;
        criticalItems.forEach(item=>{
          const typeLabel={gap:'GAP',overdue:'OVERDUE',delayed:'DELAYED',risk:'RISK'}[item.icon]||'';
          html+=`<div style="display:flex;gap:6px;align-items:center;padding:3px 0;border-bottom:1px solid var(--border)">
            <span style="font-size:9px;padding:1px 5px;border-radius:6px;background:var(--danger)12;color:var(--danger);flex-shrink:0;font-weight:700">${typeLabel}</span>
            <span style="flex:1;font-size:11px;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(item.text)}</span>
            ${item.due?`<span style="font-family:var(--font-mono);font-size:9px;color:var(--danger);flex-shrink:0">${fmtDate(item.due)}</span>`:''}
            ${item.owner?`<span style="font-size:9px;color:var(--text-muted);flex-shrink:0">${escHtml(item.owner)}</span>`:''}
          </div>`;
        });
        html+=`</div>`;
      }

      if(cautionItems.length){
        html+=`<div style="margin-bottom:0"><div style="font-size:11px;font-weight:700;color:var(--warning);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;display:flex;align-items:center;gap:5px"><svg style="width:12px;height:12px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> Caution (${cautionItems.length})</div>`;
        cautionItems.forEach(item=>{
          html+=`<div style="display:flex;gap:6px;align-items:center;padding:3px 0;border-bottom:1px solid var(--border)">
            <span style="font-size:9px;padding:1px 5px;border-radius:6px;background:var(--warning)12;color:var(--warning);flex-shrink:0;font-weight:700">DUE SOON</span>
            <span style="flex:1;font-size:11px;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(item.text)}</span>
            ${item.due?`<span style="font-family:var(--font-mono);font-size:9px;color:var(--warning);flex-shrink:0">${fmtDate(item.due)}</span>`:''}
          </div>`;
        });
        html+=`</div>`;
      }

      if(!criticalItems.length&&!cautionItems.length){
        html+=`<div style="font-size:11px;color:var(--text-muted);padding:4px 0">No active risk items</div>`;
      }

      html+=`<div style="margin-top:8px;text-align:right"><button style="font-size:10px;color:var(--accent);background:none;border:none;cursor:pointer;font-weight:600" onclick="event.stopPropagation();openOppDetail('${escAttr(o.id)}')">View full details →</button></div>`;

      html+=`</div></div></div>`;
    });

    html+=`</div>`;
  }

  return html;
}

function getLastActivityDate(o){
  const dates=[];
  (o.meetings||[]).forEach(m=>{
    if(m.fields?.Date)dates.push(m.fields.Date);
  });
  dates.sort((a,b)=>b.localeCompare(a));
  return dates[0]||(o.created||'');
}

function renderPipeline(){
  const opps=summaryData.opportunities||[];
  const active=opps.filter(o=>!['Won','Lost'].includes(o.stage));
  const stages=['Discovery','Proposal','Negotiation','Verbal Commit'];
  let html='<div class="card-grid">';
  stages.forEach(stage=>{
    const stageOpps=active.filter(o=>o.stage===stage);
    html+=`<div class="glass panel"><h3>${stage} <span style="font-size:11px;color:var(--text-muted);font-weight:400">(${stageOpps.length})</span></h3><div style="margin-top:8px;display:flex;flex-direction:column;gap:8px">`;
    stageOpps.forEach(o=>{
      const sc=stageColor(o.stage);
      html+=`<div class="glass-sm opp-card" onclick="openOppDetail('${escAttr(o.id)}')">
        <div style="padding:10px 12px">
          <div style="font-size:12px;font-weight:600;color:var(--text-primary)">${escHtml(o.client)}</div>
          <div style="font-size:11px;color:var(--text-secondary)">${escHtml(o.name)}</div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px">
            <span style="font-family:var(--font-mono);font-size:13px;font-weight:700">${fmt$(o.budget)}</span>
            <span style="font-size:10px;color:${sc}">${escHtml(o.need||'')}</span>
          </div>
          ${o.nextAction?`<div style="font-size:10px;color:var(--text-muted);margin-top:3px">Next: ${escHtml((o.nextAction||'').replace(/by\s*\d{4}-\d{2}-\d{2}/,'').replace(/—\s*\[(Planned|In Progress|Done)\]/,'').replace(/\s*—\s*$/,'').trim())}${o.nextActionDue?` · ${fmtDate(o.nextActionDue)}`:''}</div>`:''}
        </div>
      </div>`;
    });
    if(!stageOpps.length)html+=`<div style="padding:20px;text-align:center;font-size:11px;color:var(--text-muted)">No deals in this stage</div>`;
    html+=`</div></div>`;
  });
  html+='</div>';
  return html;
}

  const opps=summaryData.opportunities||[];
  if(!opps.length)return'<div class="empty-state"><svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6z"/></svg><p>No opportunities yet</p></div>';
  let html='<div class="card-grid">';
  opps.forEach(o=>{
    const sc=stageColor(o.stage);
    const isClosed=['Won','Lost'].includes(o.stage);
    html+=`<div class="glass opp-card" style="${isClosed?'opacity:0.6':''}" onclick="openOppDetail('${escAttr(o.id)}')">
      <div class="card-header" style="padding:14px 16px 8px;border-bottom:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:13px;font-weight:700;color:var(--text-primary)">${escHtml(o.client)}</span>
          <span class="status-badge" style="background:${sc}22;color:${sc};cursor:pointer" onclick="event.stopPropagation();cycleStage('${escAttr(o.id)}','${escAttr(o.stage)}')">${o.stage}${o.daysInStage>0?` (${o.daysInStage}d)`:''}</span>
        </div>
        <div style="font-size:11px;color:var(--text-secondary);margin-top:2px">${escHtml(o.name)}</div>
      </div>
      <div class="card-body">
        <div class="card-value">${fmt$(o.budget)}</div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px">
          <span style="font-size:10px;color:var(--accent)">${escHtml(o.need||'')}</span>
          <span style="font-family:var(--font-mono);font-size:9px;color:var(--text-muted)">${o.id}</span>
        </div>
        ${o.nextAction?`<div class="card-next">Next: ${escHtml((o.nextAction||'').replace(/by\s*\d{4}-\d{2}-\d{2}/,'').replace(/—\s*\[(Planned|In Progress|Done)\]/,'').replace(/\s*—\s*$/,'').trim())}${o.nextActionDue?` · ${fmtDate(o.nextActionDue)}`:''}</div>`:''}
